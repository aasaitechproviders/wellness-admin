<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cities & Apartments · KRISHA PURE Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/admin.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  /* ── Tabs ─────────────────────────────────────────────── */
  .tab-bar {
    display: flex; gap: 0; margin-bottom: 20px;
    border-bottom: 2px solid var(--border);
  }
  .tab-btn {
    padding: 10px 22px; font-size: 13.5px; font-weight: 600;
    background: none; border: none; border-bottom: 2px solid transparent;
    margin-bottom: -2px; cursor: pointer; color: var(--ink-faint);
    transition: color .15s, border-color .15s; font-family: var(--font-body);
  }
  .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
  .tab-btn:hover:not(.active) { color: var(--ink); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── City cards ───────────────────────────────────────── */
  .city-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 14px; margin-bottom: 8px;
  }
  .city-card {
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 18px 20px;
    display: flex; flex-direction: column; gap: 6px;
    transition: box-shadow .15s, border-color .15s;
  }
  .city-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.07); border-color: var(--green); }
  .city-card.inactive { opacity: .55; }
  .city-name {
    font-size: 15px; font-weight: 700; color: var(--ink);
    display: flex; align-items: center; gap: 7px;
  }
  .city-meta { font-size: 12px; color: var(--ink-faint); }
  .city-actions { display: flex; gap: 6px; margin-top: 6px; }
  .city-add-card {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 18px 20px; display: flex; align-items: center;
    justify-content: center; gap: 8px; cursor: pointer;
    color: var(--ink-faint); font-size: 13.5px; font-weight: 600;
    transition: border-color .15s, color .15s; background: none;
    min-height: 90px;
  }
  .city-add-card:hover { border-color: var(--green); color: var(--green); }

  /* ── Map picker ─────────────────────────────────────── */
  .map-search-wrap { position: relative; margin-bottom: 8px; }
  .map-search {
    width: 100%; padding: 9px 12px; box-sizing: border-box;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: var(--font-body); font-size: 13.5px;
    color: var(--ink); background: var(--white); outline: none;
  }
  .map-search:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(45,106,53,.1); }
  .map-suggestions {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.1);
    max-height: 200px; overflow-y: auto; z-index: 1000; display: none;
  }
  .map-suggestions.open { display: block; }
  .map-sug-item {
    padding: 9px 14px; cursor: pointer; font-size: 13px;
    border-bottom: 1px solid var(--border); transition: background .1s;
  }
  .map-sug-item:last-child { border-bottom: none; }
  .map-sug-item:hover { background: var(--green-pale); color: var(--green); }
  .map-sug-item .sug-sub { font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
  #apt-map {
    width: 100%; height: 280px; border-radius: 10px;
    border: 1.5px solid var(--border); margin-bottom: 8px; z-index: 0;
  }
  .map-hint {
    font-size: 11.5px; color: var(--ink-faint); margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .map-coords {
    display: none; padding: 8px 12px; border-radius: 8px;
    background: var(--green-pale); border: 1px solid rgba(45,106,53,.2);
    font-size: 12px; color: var(--green); font-family: var(--font-mono);
    margin-bottom: 4px; align-items: center; justify-content: space-between; gap: 10px;
  }
  .map-coords.visible { display: flex; }
  .map-coords a { color: var(--green); font-weight: 600; text-decoration: none; font-size: 11.5px; }
  .map-coords a:hover { text-decoration: underline; }
  .map-clear {
    border: none; background: none; color: var(--ink-faint);
    cursor: pointer; font-size: 14px; padding: 0 2px;
  }
  .map-clear:hover { color: var(--red); }

  /* ── View modal ─────────────────────────────────────── */
  .view-row { display: flex; gap: 8px; margin-bottom: 10px; font-size: 13px; }
  .view-label { min-width: 130px; color: var(--ink-faint); font-weight: 500; font-size: 12px; flex-shrink: 0; }
  .view-val { color: var(--ink); font-weight: 500; }
  .view-section {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .5px; color: var(--ink-faint);
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
    margin: 14px 0 10px;
  }
  .maps-link {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--green); font-weight: 600;
    text-decoration: none; padding: 4px 10px;
    background: var(--green-pale); border-radius: 6px;
  }
  .maps-link:hover { background: rgba(45,106,53,.18); }
  .form-sec {
    grid-column: 1/-1;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .5px; color: var(--ink-faint);
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
    margin-top: 14px; margin-bottom: 2px;
  }
</style>
</head>
<body>
<script src="js/api.js"></script>
<script>Auth.guard();</script>
<script src="js/sidebar.js"></script>
<script>
const content = renderShell({
  active: 'apartments',
  title: 'Cities & Apartments',
  sub: 'Manage delivery cities and apartment zones',
  actions: `<button class="btn btn-primary btn-sm" id="top-add-btn">+ Add</button>`,
});

const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

let cityCache = [];
let aptCache  = [];

// Which tab is active
let activeTab = 'cities';

// ── Shell ─────────────────────────────────────────────────────────────────────
content.innerHTML = `
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="cities">🏙️ Cities</button>
    <button class="tab-btn" data-tab="apartments">🏢 Apartments</button>
  </div>

  <div class="tab-pane active" id="pane-cities">
    <div id="city-grid-wrap"></div>
  </div>

  <div class="tab-pane" id="pane-apartments">
    <div class="panel">
      <div class="table-wrap">
        <table class="data">
          <thead><tr>
            <th>Apartment</th>
            <th>Address / Landmark</th>
            <th>City</th>
            <th>Manager</th>
            <th>Delivery Days</th>
            <th>Slots</th>
            <th>Status</th>
            <th></th>
          </tr></thead>
          <tbody id="apt-body">
            <tr><td colspan="8" class="loading-row"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="modal-root"></div>
`;

// ── Tab switching ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + activeTab));
    updateAddBtn();
  });
});

function updateAddBtn() {
  const btn = document.getElementById('top-add-btn');
  if (activeTab === 'cities') {
    btn.textContent = '+ Add City';
    btn.onclick = () => openCityModal(null);
  } else {
    btn.textContent = '+ Add Apartment';
    btn.onclick = () => openAptModal(null);
  }
}
updateAddBtn();

// ════════════════════════════════════════════════════════════════════════════
// CITIES
// ════════════════════════════════════════════════════════════════════════════

async function loadCities() {
  const wrap = document.getElementById('city-grid-wrap');
  wrap.innerHTML = `<div style="padding:30px;text-align:center"><div class="spinner"></div></div>`;
  try {
    const { cities } = await adminApi.getCities();
    cityCache = cities;
    renderCityGrid();
  } catch (e) {
    wrap.innerHTML = `<div class="empty"><div class="icon">⚠️</div>${escapeHtml(e.message)}</div>`;
  }
}

function renderCityGrid() {
  const wrap = document.getElementById('city-grid-wrap');
  const cards = cityCache.map(c => `
    <div class="city-card ${c.isActive === false ? 'inactive' : ''}">
      <div class="city-name">
        🏙️ ${escapeHtml(c.name)}
        <span class="pill ${c.isActive === false ? 'pill-cancelled' : 'pill-delivered'}" style="font-size:10px">
          ${c.isActive === false ? 'Inactive' : 'Active'}
        </span>
      </div>
      <div class="city-meta">Added ${fmtDate(c.createdAt)}</div>
      <div class="city-actions">
        <button class="btn btn-ghost btn-sm" onclick="openCityModal('${c._id}')">Edit</button>
        ${c.isActive !== false
          ? `<button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deactivateCity('${c._id}','${escapeHtml(c.name)}')">Deactivate</button>`
          : `<button class="btn btn-ghost btn-sm" style="color:var(--green)" onclick="activateCity('${c._id}')">Activate</button>`
        }
        <button class="btn btn-ghost btn-sm" style="color:#8B0000;font-weight:700" onclick="hardDeleteCity('${c._id}','${escapeHtml(c.name)}')">Delete</button>
      </div>
    </div>
  `).join('');

  wrap.innerHTML = `
    <div class="city-grid">
      ${cards}
      <button class="city-add-card" onclick="openCityModal(null)">
        <span style="font-size:20px">+</span> Add City
      </button>
    </div>
    ${cityCache.length === 0 ? '<div class="empty" style="margin-top:10px"><div class="icon">🏙️</div>No cities added yet. Add your first delivery city above.</div>' : ''}
  `;
}

async function deactivateCity(id, name) {
  if (!confirm(`Deactivate "${name}"? Customers won't see it.`)) return;
  try {
    await adminApi.deleteCity(id);
    showToast('City deactivated', 'success');
    loadCities();
  } catch (e) { showToast(e.message, 'error'); }
}

async function activateCity(id) {
  try {
    await adminApi.updateCity(id, { isActive: true });
    showToast('City activated', 'success');
    loadCities();
  } catch (e) { showToast(e.message, 'error'); }
}

async function hardDeleteCity(id, name) {
  if (!confirm(`Permanently delete "${name}"? This cannot be undone.`)) return;
  try {
    await adminApi.hardDeleteCity(id);
    showToast('City deleted', 'success');
    loadCities();
  } catch (e) { showToast(e.message, 'error'); }
}

function openCityModal(id) {
  const city   = id ? cityCache.find(c => c._id === id) : null;
  const isEdit = !!city;
  const root   = document.getElementById('modal-root');

  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)this.remove()">
      <div class="modal" style="max-width:420px">
        <div class="modal-head">
          <h3>${isEdit ? 'Edit City' : 'Add City'}</h3>
          <button class="modal-close" onclick="document.getElementById('modal-root').innerHTML=''">✕</button>
        </div>
        <div style="padding:4px 0 8px">
          <div class="field">
            <label>City Name *</label>
            <input id="city-name-input" value="${escapeHtml(city?.name || '')}" placeholder="e.g. Coimbatore" />
          </div>
          ${isEdit ? `
          <div class="field" style="margin-top:12px">
            <label>Status</label>
            <select id="city-active-input">
              <option value="true"  ${city.isActive !== false ? 'selected' : ''}>Active</option>
              <option value="false" ${city.isActive === false  ? 'selected' : ''}>Inactive</option>
            </select>
          </div>` : ''}
          <p style="font-size:12px;color:var(--ink-faint);margin:10px 0 0">
            Only <b>active</b> cities are visible to customers in the app.
          </p>
        </div>
        <div class="modal-foot">
          <button class="btn btn-outline" onclick="document.getElementById('modal-root').innerHTML=''">Cancel</button>
          <button class="btn btn-primary" id="city-save">${isEdit ? 'Save Changes' : 'Add City'}</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('city-save').addEventListener('click', async () => {
    const name = document.getElementById('city-name-input').value.trim();
    if (!name) { showToast('City name is required', 'error'); return; }

    const btn = document.getElementById('city-save');
    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      if (isEdit) {
        const isActive = document.getElementById('city-active-input').value === 'true';
        await adminApi.updateCity(city._id, { name, isActive });
      } else {
        await adminApi.createCity({ name });
      }
      showToast(isEdit ? 'City updated' : 'City added', 'success');
      document.getElementById('modal-root').innerHTML = '';
      loadCities();
    } catch (e) {
      showToast(e.message, 'error');
      btn.disabled = false; btn.textContent = isEdit ? 'Save Changes' : 'Add City';
    }
  });

  // Enter key support
  document.getElementById('city-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('city-save').click();
  });
}

// ════════════════════════════════════════════════════════════════════════════
// APARTMENTS
// ════════════════════════════════════════════════════════════════════════════

async function loadApartments() {
  document.getElementById('apt-body').innerHTML =
    `<tr><td colspan="8" class="loading-row"><div class="spinner"></div></td></tr>`;
  try {
    const { apartments } = await adminApi.getApartments();
    aptCache = apartments;
    renderAptTable();
  } catch (e) {
    document.getElementById('apt-body').innerHTML =
      `<tr><td colspan="8"><div class="empty"><div class="icon">⚠️</div>${escapeHtml(e.message)}</div></td></tr>`;
  }
}

function renderAptTable() {
  document.getElementById('apt-body').innerHTML = aptCache.length
    ? aptCache.map(a => `
      <tr>
        <td>
          <b>${escapeHtml(a.apartmentName)}</b>
          <div class="muted mono" style="font-size:11px">${escapeHtml(a.apartmentId || '')}</div>
        </td>
        <td style="max-width:180px">
          ${a.address  ? `<div style="font-size:12.5px">${escapeHtml(a.address)}</div>` : ''}
          ${a.landmark ? `<div class="muted" style="font-size:11.5px">📍 ${escapeHtml(a.landmark)}</div>` : ''}
          ${!a.address && !a.landmark ? '<span class="muted">—</span>' : ''}
        </td>
        <td>${escapeHtml(a.city || '–')}</td>
        <td>
          ${a.managerName  ? `<div style="font-size:13px;font-weight:500">${escapeHtml(a.managerName)}</div>` : ''}
          ${a.managerPhone ? `<div style="font-size:12px;color:var(--green)">${escapeHtml(a.managerPhone)}</div>` : ''}
          ${!a.managerName && !a.managerPhone ? '<span class="muted">—</span>' : ''}
        </td>
        <td>${(a.deliveryDays || []).join(', ') || '–'}</td>
        <td class="muted" style="font-size:12px">${(a.deliverySlots || []).join(', ') || '–'}</td>
        <td><span class="pill ${a.isActive === false ? 'pill-cancelled' : 'pill-delivered'}">${a.isActive === false ? 'Inactive' : 'Active'}</span></td>
        <td style="white-space:nowrap">
          <button class="btn btn-ghost btn-sm" onclick="viewApartment('${a._id}')">View</button>
          <button class="btn btn-ghost btn-sm" onclick="openAptModal('${a._id}')">Edit</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deactivateApt('${a._id}')">Deactivate</button>
          <button class="btn btn-ghost btn-sm" style="color:#8B0000;font-weight:700" onclick="hardDeleteApt('${a._id}','${escapeHtml(a.apartmentName)}')">Delete</button>
        </td>
      </tr>
    `).join('')
    : `<tr><td colspan="8"><div class="empty"><div class="icon">🏢</div>No apartments yet</div></td></tr>`;
}

async function deactivateApt(id) {
  if (!confirm('Deactivate this apartment?')) return;
  try { await adminApi.deleteApartment(id); showToast('Apartment deactivated', 'success'); loadApartments(); }
  catch (e) { showToast(e.message, 'error'); }
}

async function hardDeleteApt(id, name) {
  if (!confirm(`Permanently delete "${name}"? This cannot be undone.`)) return;
  try { await adminApi.hardDeleteApartment(id); showToast('Apartment permanently deleted', 'success'); loadApartments(); }
  catch (e) { showToast(e.message, 'error'); }
}

// ── Leaflet map picker ─────────────────────────────────────────────────────────
function loadLeaflet() {
  return new Promise((resolve) => {
    if (window.L) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
    s.onload = resolve;
    document.head.appendChild(s);
  });
}

async function initMapPicker(existingLat, existingLng) {
  await loadLeaflet();
  const defaultLat = existingLat || 11.0168;
  const defaultLng = existingLng || 76.9558;
  const hasPin     = !!(existingLat && existingLng);

  const map = L.map('apt-map', { zoomControl: true }).setView([defaultLat, defaultLng], hasPin ? 16 : 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>', maxZoom: 19,
  }).addTo(map);

  const greenIcon = L.divIcon({
    html: '<div style="width:28px;height:28px;background:#2D6A35;border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,.3)"></div>',
    iconSize: [28, 28], iconAnchor: [14, 28], className: '',
  });

  let marker = hasPin
    ? L.marker([existingLat, existingLng], { icon: greenIcon, draggable: true }).addTo(map)
    : null;

  const latInput   = document.getElementById('loc-lat');
  const lngInput   = document.getElementById('loc-lng');
  const coordsBar  = document.getElementById('map-coords-bar');
  const coordsText = document.getElementById('map-coords-text');
  const coordsLink = document.getElementById('map-coords-link');

  function setPin(lat, lng) {
    lat = parseFloat(lat.toFixed(6));
    lng = parseFloat(lng.toFixed(6));
    latInput.value = lat;
    lngInput.value = lng;
    coordsBar.classList.add('visible');
    coordsText.textContent = `${lat}, ${lng}`;
    coordsLink.href = `https://www.google.com/maps?q=${lat},${lng}`;
    if (marker) {
      marker.setLatLng([lat, lng]);
    } else {
      marker = L.marker([lat, lng], { icon: greenIcon, draggable: true }).addTo(map);
      marker.on('dragend', e => { const p = e.target.getLatLng(); setPin(p.lat, p.lng); });
    }
    map.setView([lat, lng], Math.max(map.getZoom(), 16));
  }

  if (hasPin) {
    setPin(existingLat, existingLng);
    marker.on('dragend', e => { const p = e.target.getLatLng(); setPin(p.lat, p.lng); });
  }

  map.on('click', e => setPin(e.latlng.lat, e.latlng.lng));

  document.getElementById('map-clear-btn')?.addEventListener('click', () => {
    if (marker) { map.removeLayer(marker); marker = null; }
    latInput.value = '';
    lngInput.value = '';
    coordsBar.classList.remove('visible');
  });

  const searchInput = document.getElementById('map-search-input');
  const suggestions = document.getElementById('map-suggestions');
  let searchTimer   = null;

  async function doSearch(q) {
    suggestions.innerHTML = '<div class="map-sug-item" style="color:var(--ink-faint)">Searching…</div>';
    suggestions.classList.add('open');
    try {
      const res  = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&countrycodes=in&addressdetails=1`, {
        headers: { 'Accept-Language': 'en' }
      });
      const data = await res.json();
      if (!data.length) {
        suggestions.innerHTML = '<div class="map-sug-item" style="color:var(--ink-faint)">No results found</div>';
        return;
      }
      suggestions.innerHTML = data.map((r, i) =>
        `<div class="map-sug-item" data-i="${i}">
          <div>${escapeHtml(r.display_name.split(',')[0])}</div>
          <div class="sug-sub">${escapeHtml(r.display_name.split(',').slice(1,4).join(','))}</div>
        </div>`
      ).join('');
      suggestions.querySelectorAll('.map-sug-item').forEach((el, i) => {
        el.addEventListener('mousedown', e => {
          e.preventDefault();
          const r = data[i];
          setPin(parseFloat(r.lat), parseFloat(r.lon));
          searchInput.value = r.display_name.split(',')[0];
          suggestions.classList.remove('open');
        });
      });
    } catch (e) {
      suggestions.innerHTML = '<div class="map-sug-item" style="color:var(--red)">Search failed</div>';
    }
  }

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = searchInput.value.trim();
    if (!q || q.length < 3) { suggestions.classList.remove('open'); return; }
    searchTimer = setTimeout(() => doSearch(q), 400);
  });
  searchInput.addEventListener('blur', () => setTimeout(() => suggestions.classList.remove('open'), 200));
  setTimeout(() => map.invalidateSize(), 100);
}

// ── Add / Edit Apartment Modal ─────────────────────────────────────────────────
async function openAptModal(id) {
  const a      = id ? aptCache.find(x => x._id === id) : null;
  const isEdit = !!a;
  const mySlots = a?.deliverySlots || [];
  const myDays  = new Set(a?.deliveryDays || []);
  const existLat = a?.location?.lat || a?.latitude  || null;
  const existLng = a?.location?.lng || a?.longitude || null;
  const root    = document.getElementById('modal-root');

  // Build city options dynamically from cityCache (only active cities)
  const activeCities = cityCache.filter(c => c.isActive !== false);
  const cityOptions = activeCities.length
    ? activeCities.map(c =>
        `<option value="${escapeHtml(c.name)}" ${a?.city === c.name ? 'selected' : ''}>${escapeHtml(c.name)}</option>`
      ).join('')
    : `<option value="${escapeHtml(a?.city || '')}">` + escapeHtml(a?.city || 'No cities — add one first') + `</option>`;

  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) this.remove()">
      <div class="modal" style="max-width:620px">
        <div class="modal-head">
          <h3>${isEdit ? 'Edit Apartment' : 'Add Apartment'}</h3>
          <button class="modal-close" onclick="document.getElementById('modal-root').innerHTML=''">✕</button>
        </div>
        <div style="max-height:76vh;overflow-y:auto;padding-right:4px" id="modal-scroll">
        <form id="apt-form" class="form-grid" style="gap:0 14px">

          <div class="field full">
            <label>Apartment Name *</label>
            <input name="apartmentName" value="${escapeHtml(a?.apartmentName || '')}" required placeholder="e.g. Green Meadows Residency" />
          </div>
          <div class="field">
            <label>Apartment ID</label>
            <input name="apartmentId" value="${escapeHtml(a?.apartmentId || '')}" placeholder="auto if blank" />
          </div>
          <div class="field">
            <label>City *</label>
            <select name="city">
              ${activeCities.length === 0 ? `<option value="">— No active cities —</option>` : ''}
              ${cityOptions}
            </select>
            ${activeCities.length === 0 ? `<div style="font-size:11.5px;color:var(--red);margin-top:4px">Add an active city first in the Cities tab.</div>` : ''}
          </div>

          <div class="form-sec">📍 Address Details</div>
          <div class="field full">
            <label>Full Address</label>
            <textarea name="address" rows="2" placeholder="Door no., Street, Area, City – Pincode">${escapeHtml(a?.address || '')}</textarea>
          </div>
          <div class="field">
            <label>Landmark</label>
            <input name="landmark" value="${escapeHtml(a?.landmark || '')}" placeholder="e.g. Near Big Bazaar" />
          </div>
          <div class="field">
            <label>Pincode</label>
            <input name="pincode" value="${escapeHtml(a?.pincode || '')}" placeholder="e.g. 641004" maxlength="6" />
          </div>

          <div class="form-sec">🗺️ Location on Map</div>
          <div class="field full">
            <label>Search and pin the apartment location</label>
            <div class="map-search-wrap">
              <input class="map-search" id="map-search-input" placeholder="Search apartment name, area or address…" autocomplete="off" />
              <div class="map-suggestions" id="map-suggestions"></div>
            </div>
            <div class="map-hint">
              <span>💡</span>
              <span>Search to jump to a location, then <b>click on the map</b> to drop the pin. <b>Drag the pin</b> to fine-tune.</span>
            </div>
            <div id="apt-map"></div>
            <div class="map-coords" id="map-coords-bar">
              <span id="map-coords-text" style="font-size:12px"></span>
              <div style="display:flex;align-items:center;gap:10px">
                <a id="map-coords-link" href="#" target="_blank">Verify on Google Maps ↗</a>
                <button type="button" class="map-clear" id="map-clear-btn" title="Clear pin">✕</button>
              </div>
            </div>
            <input type="hidden" id="loc-lat" name="latitude"  value="${existLat || ''}" />
            <input type="hidden" id="loc-lng" name="longitude" value="${existLng || ''}" />
          </div>

          <div class="form-sec">👔 Manager Details</div>
          <div class="field">
            <label>Manager Name</label>
            <input name="managerName" value="${escapeHtml(a?.managerName || '')}" placeholder="e.g. Ravi Kumar" />
          </div>
          <div class="field">
            <label>Manager Phone</label>
            <input name="managerPhone" type="tel" value="${escapeHtml(a?.managerPhone || '')}" placeholder="98765 43210" />
          </div>

          <div class="form-sec">🛡️ Security Details</div>
          <div class="field">
            <label>Security Name</label>
            <input name="securityName" value="${escapeHtml(a?.securityName || '')}" placeholder="e.g. Murugan" />
          </div>
          <div class="field">
            <label>Security Phone</label>
            <input name="securityPhone" type="tel" value="${escapeHtml(a?.securityPhone || '')}" placeholder="98765 43210" />
          </div>

          <div class="form-sec">🚚 Delivery Schedule</div>
          <div class="field full">
            <label>Delivery Days</label>
            <div class="chip-row">
              ${DAYS.map(d => `<div class="chip-toggle ${myDays.has(d) ? 'on' : ''}" data-day="${d}">${d}</div>`).join('')}
            </div>
          </div>
          <div class="field full">
            <label>Delivery Slots <span style="font-weight:400;color:var(--ink-faint)">— comma-separated</span></label>
            <textarea name="deliverySlots" rows="2" placeholder="e.g. 7:00 AM – 10:00 AM, 4:00 PM – 7:00 PM">${mySlots.join(', ')}</textarea>
          </div>

          <div class="field full">
            <label>Internal Notes</label>
            <textarea name="notes" rows="2" placeholder="Gate code, special access instructions…">${escapeHtml(a?.notes || '')}</textarea>
          </div>

        </form>
        </div>
        <div class="modal-foot">
          <button class="btn btn-outline" onclick="document.getElementById('modal-root').innerHTML=''">Cancel</button>
          <button class="btn btn-primary" id="apt-save">${isEdit ? 'Save Changes' : 'Create Apartment'}</button>
        </div>
      </div>
    </div>
  `;

  // Day chip toggles
  root.querySelectorAll('[data-day]').forEach(chip =>
    chip.addEventListener('click', () => chip.classList.toggle('on'))
  );

  initMapPicker(existLat ? parseFloat(existLat) : null, existLng ? parseFloat(existLng) : null);

  document.getElementById('apt-save').addEventListener('click', async () => {
    const fd  = new FormData(document.getElementById('apt-form'));
    const lat = document.getElementById('loc-lat').value;
    const lng = document.getElementById('loc-lng').value;

    const body = {
      apartmentName: fd.get('apartmentName'),
      apartmentId:   fd.get('apartmentId')   || undefined,
      city:          fd.get('city'),
      address:       fd.get('address')        || undefined,
      landmark:      fd.get('landmark')       || undefined,
      pincode:       fd.get('pincode')        || undefined,
      managerName:   fd.get('managerName')    || undefined,
      managerPhone:  fd.get('managerPhone')   || undefined,
      securityName:  fd.get('securityName')   || undefined,
      securityPhone: fd.get('securityPhone')  || undefined,
      notes:         fd.get('notes')          || undefined,
      deliveryDays:  Array.from(root.querySelectorAll('[data-day].on')).map(el => el.dataset.day),
      deliverySlots: fd.get('deliverySlots').split(',').map(s => s.trim()).filter(Boolean),
      location:      lat && lng ? { lat: parseFloat(lat), lng: parseFloat(lng) } : undefined,
    };

    if (!body.apartmentName) { showToast('Apartment name is required', 'error'); return; }
    if (!body.city)           { showToast('Please select a city', 'error'); return; }

    const btn = document.getElementById('apt-save');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      if (isEdit) await adminApi.updateApartment(a._id, body);
      else        await adminApi.createApartment(body);
      showToast('Apartment saved', 'success');
      document.getElementById('modal-root').innerHTML = '';
      loadApartments();
    } catch (e) {
      showToast(e.message, 'error');
      btn.disabled = false; btn.textContent = isEdit ? 'Save Changes' : 'Create Apartment';
    }
  });
}

// ── View Apartment Modal ───────────────────────────────────────────────────────
function viewApartment(id) {
  const a   = aptCache.find(x => x._id === id);
  if (!a) return;
  const root = document.getElementById('modal-root');
  const lat  = a.location?.lat || a.latitude;
  const lng  = a.location?.lng || a.longitude;

  function row(label, val) {
    if (!val) return '';
    return `<div class="view-row">
      <span class="view-label">${label}</span>
      <span class="view-val">${escapeHtml(String(val))}</span>
    </div>`;
  }

  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)this.remove()">
      <div class="modal" style="max-width:500px">
        <div class="modal-head">
          <h3>🏢 ${escapeHtml(a.apartmentName)}</h3>
          <button class="modal-close" onclick="document.getElementById('modal-root').innerHTML=''">✕</button>
        </div>
        <div style="max-height:70vh;overflow-y:auto;padding-right:4px">

          <div class="view-section">Basic</div>
          ${row('Apartment ID', a.apartmentId)}
          ${row('City', a.city)}
          <div class="view-row">
            <span class="view-label">Status</span>
            <span class="pill ${a.isActive===false?'pill-cancelled':'pill-delivered'}">${a.isActive===false?'Inactive':'Active'}</span>
          </div>

          <div class="view-section">📍 Address</div>
          ${row('Full Address', a.address)}
          ${row('Landmark', a.landmark)}
          ${row('Pincode', a.pincode)}
          ${lat && lng ? `
          <div class="view-row">
            <span class="view-label">Map Location</span>
            <span class="view-val" style="display:flex;flex-direction:column;gap:5px">
              <span style="font-family:var(--font-mono);font-size:12px">${lat}, ${lng}</span>
              <a class="maps-link" href="https://www.google.com/maps?q=${lat},${lng}" target="_blank">🗺️ Open in Google Maps ↗</a>
            </span>
          </div>` : ''}
          ${row('Notes', a.notes)}

          <div class="view-section">👔 Manager</div>
          ${a.managerName || a.managerPhone
            ? `${row('Name', a.managerName)}${row('Phone', a.managerPhone)}`
            : '<div class="view-row"><span class="muted" style="font-size:13px">Not set</span></div>'}

          <div class="view-section">🛡️ Security</div>
          ${a.securityName || a.securityPhone
            ? `${row('Name', a.securityName)}${row('Phone', a.securityPhone)}`
            : '<div class="view-row"><span class="muted" style="font-size:13px">Not set</span></div>'}

          <div class="view-section">🚚 Delivery Schedule</div>
          <div class="view-row">
            <span class="view-label">Days</span>
            <span class="view-val" style="display:flex;flex-wrap:wrap;gap:5px">
              ${(a.deliveryDays||[]).map(d =>
                `<span style="background:var(--green-pale);color:var(--green);border-radius:6px;padding:3px 9px;font-size:12.5px;font-weight:600">${d}</span>`
              ).join('') || '—'}
            </span>
          </div>
          <div class="view-row">
            <span class="view-label">Time Slots</span>
            <span class="view-val" style="display:flex;flex-direction:column;gap:4px">
              ${(a.deliverySlots||[]).map(s =>
                `<span style="background:#FFF8E1;color:#7B5E2A;border-radius:6px;padding:3px 10px;font-size:12.5px;display:inline-block">${escapeHtml(s)}</span>`
              ).join('') || '—'}
            </span>
          </div>

        </div>
        <div class="modal-foot">
          <button class="btn btn-outline" onclick="document.getElementById('modal-root').innerHTML=''">Close</button>
          <button class="btn btn-primary" onclick="document.getElementById('modal-root').innerHTML='';openAptModal('${a._id}')">Edit</button>
        </div>
      </div>
    </div>
  `;
}

// ── Initial load ───────────────────────────────────────────────────────────────
// Load both in parallel
Promise.all([loadCities(), loadApartments()]);
</script>
</body>
</html>
