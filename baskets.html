<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Curated Baskets · KRISHA PURE Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/admin.css" />
<style>
  /* ── Image ─────────────────────────────────────────── */
  .bk-thumb { width:44px;height:44px;border-radius:8px;object-fit:cover;border:1.5px solid var(--border);display:block; }
  .bk-thumb-empty { width:44px;height:44px;border-radius:8px;border:1.5px dashed var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink-faint); }
  .img-thumb-large { width:80px;height:80px;border-radius:8px;object-fit:cover;border:1.5px solid var(--border);flex-shrink:0;display:block; }
  .img-thumb-placeholder { width:80px;height:80px;border-radius:8px;border:1.5px dashed var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0; }
  .img-info-name { font-size:13px;font-weight:600;color:var(--ink); }
  .img-info-status { font-size:12px;margin-top:4px;font-weight:500; }
  .img-info-status.ok    { color:var(--green); }
  .img-info-status.error { color:var(--red); }
  .img-info-status.busy  { color:#7B5E2A; }

  /* ── Toggle chips (goals / health challenges) ───────── */
  .toggle-chips { display:flex;flex-wrap:wrap;gap:7px;padding:6px 0 4px; }
  .tog {
    display:inline-flex;align-items:center;gap:5px;
    padding:5px 13px;border-radius:20px;cursor:pointer;
    font-size:12.5px;font-weight:500;user-select:none;
    border:1.5px solid var(--border);background:var(--white);color:var(--ink-faint);
    transition:all .12s;
  }
  .tog:hover { border-color:var(--green);color:var(--green);background:var(--green-pale); }
  .tog.on { border-color:var(--green);background:var(--green);color:#fff; }
  .tog.red.on { border-color:var(--red);background:var(--red);color:#fff; }
  .tog.red:hover { border-color:var(--red);color:var(--red);background:#fff5f5; }

  /* ── Excluded products picker ───────────────────────── */
  .picker-outer { position:relative; }
  .picker-search {
    width:100%;padding:9px 12px;
    border:1.5px solid var(--border);border-radius:8px;
    font-family:var(--font-body);font-size:13.5px;
    color:var(--ink);background:var(--white);outline:none;box-sizing:border-box;
  }
  .picker-search:focus { border-color:var(--green);box-shadow:0 0 0 3px rgba(45,106,53,.1); }
  .picker-dropdown {
    position:absolute;top:calc(100% + 4px);left:0;right:0;
    background:var(--white);border:1.5px solid var(--border);
    border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.1);
    max-height:200px;overflow-y:auto;z-index:200;display:none;
  }
  .picker-dropdown.open { display:block; }
  .picker-option {
    display:flex;align-items:center;gap:10px;
    padding:9px 14px;cursor:pointer;font-size:13.5px;transition:background .12s;
  }
  .picker-option:hover { background:var(--green-pale); }
  .picker-option.already { opacity:.45;cursor:default;pointer-events:none; }
  .picker-empty { padding:14px;text-align:center;color:var(--ink-faint);font-size:13px; }

  /* ── Excluded chips (red) ───────────────────────────── */
  .chips-wrap { display:flex;flex-wrap:wrap;gap:6px;min-height:32px;padding:8px 0 2px; }
  .chip-ex {
    display:inline-flex;align-items:center;gap:5px;
    background:#fff5f5;color:var(--red);
    border:1px solid rgba(220,53,69,.2);border-radius:20px;
    padding:4px 10px 4px 12px;font-size:12.5px;font-weight:500;
  }
  .chip-ex-remove {
    cursor:pointer;font-size:14px;line-height:1;color:var(--red);
    opacity:.7;padding:0 2px;border:none;background:none;
  }
  .chip-ex-remove:hover { opacity:1; }
  .chips-empty { color:var(--ink-faint);font-size:12.5px;padding:6px 0; }

  /* ── Nutrition rows ──────────────────────────────────── */
  .nut-row {
    display:grid;grid-template-columns:1fr 100px 90px 32px;
    gap:8px;align-items:center;margin-bottom:8px;
  }
  .nut-row select, .nut-row input {
    padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;
    font-family:var(--font-body);font-size:13px;color:var(--ink);
    background:var(--white);outline:none;width:100%;box-sizing:border-box;
  }
  .nut-row select:focus, .nut-row input:focus { border-color:var(--green); }
  .nut-remove {
    width:28px;height:28px;border:none;background:none;cursor:pointer;
    color:var(--ink-faint);font-size:16px;display:flex;align-items:center;justify-content:center;
    border-radius:5px;
  }
  .nut-remove:hover { background:var(--red-pale);color:var(--red); }
  .add-nut-btn {
    display:inline-flex;align-items:center;gap:6px;
    font-size:12.5px;color:var(--green);font-weight:600;
    border:1.5px dashed rgba(45,106,53,.35);border-radius:8px;
    background:var(--green-pale);cursor:pointer;
    padding:8px 14px;margin-top:4px;transition:background .12s;
  }
  .add-nut-btn:hover { background:rgba(45,106,53,.12); }

  /* ── Table badges ────────────────────────────────────── */
  .tag-sm {
    font-size:11px;background:var(--green-pale);color:var(--green);
    border-radius:5px;padding:2px 7px;display:inline-block;margin:1px;
  }
  .tag-sm.red { background:#fff5f5;color:var(--red); }
  .tag-sm.grey { background:var(--surface);color:var(--ink-faint); }

  /* ── Section divider inside modal ───────────────────── */
  .form-section {
    grid-column:1/-1;
    font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
    color:var(--ink-faint);padding:12px 0 4px;border-top:1px solid var(--border);
    margin-top:4px;
  }
  .form-section:first-child { border-top:none;margin-top:0; }
</style>
</head>
<body>
<script src="js/api.js"></script>
<script>Auth.guard();</script>
<script src="js/sidebar.js"></script>
<script>
const content = renderShell({
  active: 'baskets',
  title:   'Curated Baskets',
  sub:     'Wellness basket templates — define target profile, excluded products & nutrition targets',
  actions: `<button class="btn btn-primary btn-sm" id="add-btn">+ Add Basket</button>`,
});

let cache       = [];
let goalsCache  = [];
let hcCache     = [];

const AGE_GROUPS = ['15 – 25', '25 – 40', '40 – 60', 'Above 60'];
const BMI_CATS   = [
  { label: 'Underweight  (< 18.5)',   value: 'underweight' },
  { label: 'Normal  (18.5 – 24.9)',   value: 'normal' },
  { label: 'Overweight  (25 – 29.9)', value: 'overweight' },
  { label: 'Obese  (≥ 30)',           value: 'obese' },
];
const ACTIVITY   = ['High', 'Moderate', 'Low', 'Idle'];

const NUTRIENTS  = [
  'Calories','Protein','Carbohydrates','Fat','Fiber','Sugar',
  'Iron','Calcium','Magnesium','Potassium','Sodium',
  'Vitamin A','Vitamin B12','Vitamin C','Vitamin D','Vitamin E','Vitamin K',
  'Zinc','Phosphorus','Folate','Omega-3','Omega-6',
];
const UNITS = ['g','mg','mcg','kg','Kcal','cal','IU','%DV'];

// ── Pre-load goals + health challenges ───────────────────────────────────────
(async () => {
  try {
    const [g, h] = await Promise.all([adminApi.getGoals(), adminApi.getHealthChallenges()]);
    goalsCache = g.goals.filter(x => x.isActive !== false);
    hcCache    = h.challenges.filter(x => x.isActive !== false);
  } catch(e) {}
})();

content.innerHTML = `
  <div class="panel">
    <div class="table-wrap">
      <table class="data">
        <thead><tr>
          <th style="width:52px">Image</th>
          <th>Basket Name</th>
          <th>Target Profile</th>
          <th>Goals</th>
          <th>Health Challenges</th>
          <th>Excluded</th>
          <th>Status</th>
          <th></th>
        </tr></thead>
        <tbody id="body">
          <tr><td colspan="8" class="loading-row"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div id="modal-root"></div>
`;

document.getElementById('add-btn').addEventListener('click', () => openModal(null));

// ── Load ──────────────────────────────────────────────────────────────────────
async function load() {
  document.getElementById('body').innerHTML =
    `<tr><td colspan="8" class="loading-row"><div class="spinner"></div></td></tr>`;
  try {
    const { baskets } = await adminApi.getBaskets();
    cache = baskets;
    document.getElementById('body').innerHTML = baskets.length
      ? baskets.map(b => `
        <tr>
          <td>
            ${b.hasImage && b.imageUrl
              ? `<img src="${escapeHtml(b.imageUrl)}" class="bk-thumb" alt="" loading="lazy" />`
              : `<div class="bk-thumb-empty">🧺</div>`}
          </td>
          <td>
            <b>${escapeHtml(b.basketName)}</b>
            ${b.description ? `<div class="muted" style="font-size:11.5px;margin-top:2px">${escapeHtml(b.description.slice(0,60))}${b.description.length>60?'…':''}</div>` : ''}
          </td>
          <td style="font-size:12px">
            ${b.ageGroup    ? `<div><span class="tag-sm grey">Age</span> ${escapeHtml(b.ageGroup)}</div>` : ''}
            ${b.bmiCategory ? `<div><span class="tag-sm grey">BMI</span> ${escapeHtml(b.bmiCategory)}</div>` : ''}
            ${b.activityLevel ? `<div><span class="tag-sm grey">Activity</span> ${escapeHtml(b.activityLevel)}</div>` : ''}
          </td>
          <td style="max-width:160px">
            ${(b.wellnessGoals||[]).map(g=>`<span class="tag-sm">${escapeHtml(g)}</span>`).join('') || '<span class="muted">—</span>'}
          </td>
          <td style="max-width:160px">
            ${(b.healthChallenges||[]).map(h=>`<span class="tag-sm">${escapeHtml(h)}</span>`).join('') || '<span class="muted">—</span>'}
          </td>
          <td style="max-width:120px">
            ${(b.excludedProducts||[]).length
              ? `<span class="tag-sm red">⛔ ${b.excludedProducts.length} excluded</span>`
              : '<span class="muted">—</span>'}
          </td>
          <td>
            <span class="pill ${b.isActive===false?'pill-cancelled':'pill-delivered'}">
              ${b.isActive===false?'Inactive':'Active'}
            </span>
          </td>
          <td style="white-space:nowrap">
            <button class="btn btn-ghost btn-sm" onclick="openModal('${b._id}')">Edit</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--red)"
              onclick="toggleActive('${b._id}',${b.isActive===false})">
              ${b.isActive===false?'Activate':'Deactivate'}
            </button>
            <button class="btn btn-ghost btn-sm" style="color:#8B0000;font-weight:700"
              onclick="hardDelete('${b._id}','${escapeHtml(b.basketName)}')">Delete</button>
          </td>
        </tr>
      `).join('')
      : `<tr><td colspan="8"><div class="empty"><div class="icon">🧺</div>No curated baskets yet. Add one above.</div></td></tr>`;
  } catch(e) {
    document.getElementById('body').innerHTML =
      `<tr><td colspan="8"><div class="empty"><div class="icon">⚠️</div>${escapeHtml(e.message)}</div></td></tr>`;
  }
}

async function toggleActive(id, isInactive) {
  if (!confirm((isInactive?'Activate':'Deactivate') + ' this basket?')) return;
  try {
    if (isInactive) await adminApi.updateBasket(id, { isActive: true });
    else            await adminApi.deleteBasket(id);
    showToast('Basket ' + (isInactive?'activated':'deactivated'), 'success');
    load();
  } catch(e) { showToast(e.message, 'error'); }
}

async function hardDelete(id, name) {
  if (!confirm(`Permanently delete "${name}"? Cannot be undone.`)) return;
  try { await adminApi.hardDeleteBasket(id); showToast('Basket deleted','success'); load(); }
  catch(e) { showToast(e.message,'error'); }
}

// ── Toggle chip helper ────────────────────────────────────────────────────────
function initToggleChips(containerId, items, initial=[], colorClass='') {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;
  let selected = [...initial];
  if (!items.length) {
    wrap.innerHTML = `<span style="color:var(--ink-faint);font-size:12.5px">None available</span>`;
    wrap._getSelected = () => selected;
    return;
  }
  wrap.innerHTML = items.map(item => `
    <span class="tog ${colorClass} ${selected.includes(item)?'on':''}" data-val="${escapeHtml(item)}">${escapeHtml(item)}</span>
  `).join('');
  wrap.querySelectorAll('.tog').forEach(chip => {
    chip.addEventListener('click', () => {
      const v = chip.dataset.val;
      if (selected.includes(v)) { selected = selected.filter(s=>s!==v); chip.classList.remove('on'); }
      else { selected.push(v); chip.classList.add('on'); }
    });
  });
  wrap._getSelected = () => selected;
}

// ── Excluded products picker ──────────────────────────────────────────────────
function initExcludedPicker(containerId, initial=[]) {
  const root     = document.getElementById(containerId);
  const searchEl = root.querySelector('.picker-search');
  const dropdown = root.querySelector('.picker-dropdown');
  const chipsEl  = root.querySelector('.chips-wrap');
  let selected   = [...initial];
  let timer      = null;

  function renderChips() {
    chipsEl.innerHTML = selected.length
      ? selected.map((n,i) => `
          <span class="chip-ex">${escapeHtml(n)}
            <button class="chip-ex-remove" data-idx="${i}">✕</button>
          </span>`).join('')
      : `<span class="chips-empty">No products excluded — search to add</span>`;
    chipsEl.querySelectorAll('.chip-ex-remove').forEach(btn => {
      btn.addEventListener('click', () => { selected.splice(Number(btn.dataset.idx),1); renderChips(); });
    });
  }

  function renderDropdown(items) {
    dropdown.innerHTML = items.length
      ? items.map(ing => {
          const already = selected.includes(ing.name);
          return `<div class="picker-option ${already?'already':''}" data-name="${escapeHtml(ing.name)}">
            <span>${escapeHtml(ing.name)}</span>
            <span style="font-size:11px;color:var(--ink-faint);margin-left:auto">${already?'Added':escapeHtml(ing.category||'')}</span>
          </div>`;
        }).join('')
      : `<div class="picker-empty">No products found</div>`;
    dropdown.classList.add('open');
    dropdown.querySelectorAll('.picker-option:not(.already)').forEach(opt => {
      opt.addEventListener('mousedown', e => {
        e.preventDefault();
        selected.push(opt.dataset.name);
        renderChips();
        searchEl.value = '';
        dropdown.classList.remove('open');
      });
    });
  }

  async function doSearch(q) {
    try {
      const { ingredients } = await adminApi.getIngredients({ search: q, limit: 40 });
      renderDropdown(ingredients);
    } catch(e) {
      dropdown.innerHTML = `<div class="picker-empty">Search failed</div>`;
      dropdown.classList.add('open');
    }
  }

  searchEl.addEventListener('input', () => {
    clearTimeout(timer);
    const q = searchEl.value.trim();
    if (!q) { dropdown.classList.remove('open'); return; }
    timer = setTimeout(() => doSearch(q), 250);
  });
  searchEl.addEventListener('focus', () => { if (!searchEl.value.trim()) doSearch(''); });
  searchEl.addEventListener('blur',  () => setTimeout(() => dropdown.classList.remove('open'), 180));

  renderChips();
  root._getSelected = () => selected;
}

// ── Nutrition target rows ─────────────────────────────────────────────────────
function initNutritionRows(containerId, initial=[]) {
  const wrap = document.getElementById(containerId);
  let rows   = initial.length ? initial.map(r=>({...r})) : [];

  function render() {
    wrap.innerHTML = '';

    if (rows.length) {
      // header
      const hdr = document.createElement('div');
      hdr.style.cssText = 'display:grid;grid-template-columns:1fr 100px 90px 32px;gap:8px;margin-bottom:4px';
      hdr.innerHTML = ['Nutrient','Value','Unit',''].map(t =>
        `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-faint)">${t}</div>`
      ).join('');
      wrap.appendChild(hdr);

      rows.forEach((row, i) => {
        const div = document.createElement('div');
        div.className = 'nut-row';

        const sel = document.createElement('select');
        NUTRIENTS.forEach(n => {
          const o = document.createElement('option');
          o.value = n; o.textContent = n;
          if (n === row.nutrient) o.selected = true;
          sel.appendChild(o);
        });
        if (!row.nutrient) sel.value = NUTRIENTS[0];
        sel.addEventListener('change', () => { rows[i].nutrient = sel.value; });

        const inp = document.createElement('input');
        inp.type        = 'number';
        inp.min         = '0';
        inp.step        = '0.1';
        inp.placeholder = '0';
        inp.value       = row.value || '';
        inp.addEventListener('input', () => { rows[i].value = inp.value; });

        const unit = document.createElement('select');
        UNITS.forEach(u => {
          const o = document.createElement('option');
          o.value = u; o.textContent = u;
          if (u === row.unit) o.selected = true;
          unit.appendChild(o);
        });
        unit.addEventListener('change', () => { rows[i].unit = unit.value; });

        const rem = document.createElement('button');
        rem.type      = 'button';
        rem.className = 'nut-remove';
        rem.title     = 'Remove';
        rem.textContent = '✕';
        rem.addEventListener('click', () => { rows.splice(i,1); render(); });

        div.append(sel, inp, unit, rem);
        wrap.appendChild(div);
      });
    }

    const addBtn = document.createElement('button');
    addBtn.type      = 'button';
    addBtn.className = 'add-nut-btn';
    addBtn.textContent = '+ Add Nutrient';
    addBtn.addEventListener('click', () => {
      rows.push({ nutrient: NUTRIENTS[0], value: '', unit: UNITS[0] });
      render();
      setTimeout(() => {
        const sels = wrap.querySelectorAll('.nut-row select');
        if (sels.length) sels[sels.length-2].focus();
      }, 30);
    });
    wrap.appendChild(addBtn);
  }

  render();
  wrap._getRows = () => rows
    .filter(r => r.nutrient && r.value !== '' && r.value !== null)
    .map(r => ({ nutrient: r.nutrient, value: Number(r.value), unit: r.unit || UNITS[0] }));
}

// ── Image upload (edit mode) ──────────────────────────────────────────────────
function initImageUpload(b) {
  const fileInput  = document.getElementById('img-file-input');
  const uploadBtn  = document.getElementById('img-upload-btn');
  const statusEl   = document.getElementById('img-status');
  const filenameEl = document.getElementById('img-filename');
  const deleteBtn  = document.getElementById('img-delete-btn');
  let pendingFile  = null;

  if (!fileInput) return;

  fileInput.addEventListener('change', function() {
    const file = fileInput.files[0];
    if (!file) return;
    if (!['image/jpeg','image/png','image/webp'].includes(file.type)) {
      showToast('Only JPEG, PNG, or WebP allowed', 'error'); fileInput.value=''; return;
    }
    pendingFile = file;
    filenameEl.textContent = file.name;
    statusEl.className = 'img-info-status'; statusEl.textContent = '📎 Ready to upload — click Upload';
    uploadBtn.disabled = false;
    const reader = new FileReader();
    reader.onload = ev => {
      var preview = document.getElementById('img-preview');
      var noThumb = document.getElementById('img-no-thumb');
      if (preview) { preview.src = ev.target.result; preview.style.display='block'; }
      else {
        if (noThumb) noThumb.style.display='none';
        var img = document.createElement('img');
        img.id='img-preview'; img.className='img-thumb-large';
        img.src=ev.target.result; img.alt='Preview';
        document.getElementById('img-thumb-wrap').prepend(img);
      }
    };
    reader.readAsDataURL(file);
  });

  uploadBtn.addEventListener('click', async function() {
    if (!pendingFile) return;
    uploadBtn.disabled=true; uploadBtn.textContent='⏳ Uploading…';
    statusEl.className='img-info-status busy'; statusEl.textContent='Uploading to S3…';
    try {
      await uploadBasketImageToS3(b._id, pendingFile);
      pendingFile=null;
      statusEl.className='img-info-status ok'; statusEl.textContent='✅ Uploaded successfully';
      uploadBtn.textContent='⬆ Upload'; uploadBtn.disabled=true;
      if (!document.getElementById('img-delete-btn')) {
        const btn = document.createElement('button');
        btn.type='button'; btn.id='img-delete-btn';
        btn.className='btn btn-ghost btn-sm'; btn.style.color='var(--red)';
        btn.textContent='Remove';
        btn.addEventListener('click', handleRemove);
        uploadBtn.insertAdjacentElement('afterend', btn);
      }
      showToast('Image uploaded ✅','success'); load();
    } catch(e) {
      statusEl.className='img-info-status error'; statusEl.textContent='❌ '+e.message;
      uploadBtn.disabled=false; uploadBtn.textContent='⬆ Retry';
      showToast(e.message,'error');
    }
  });

  async function handleRemove() {
    if (!confirm('Remove image for this basket?')) return;
    const btn = document.getElementById('img-delete-btn');
    btn.disabled=true; btn.textContent='Removing…';
    try {
      await adminApi.deleteBasketImage(b._id);
      const preview=document.getElementById('img-preview');
      const noThumb=document.getElementById('img-no-thumb');
      if (preview) preview.style.display='none';
      if (noThumb) noThumb.style.display='flex';
      filenameEl.textContent='No image yet';
      statusEl.className='img-info-status'; statusEl.textContent='';
      uploadBtn.disabled=true; uploadBtn.textContent='⬆ Upload';
      btn.remove(); fileInput.value=''; pendingFile=null;
      showToast('Image removed','success'); load();
    } catch(e) { showToast(e.message,'error'); btn.disabled=false; btn.textContent='Remove'; }
  }

  if (deleteBtn) deleteBtn.addEventListener('click', handleRemove);
}

// ── Modal ─────────────────────────────────────────────────────────────────────
async function openModal(id) {
  if (!goalsCache.length || !hcCache.length) {
    try {
      const [g,h] = await Promise.all([adminApi.getGoals(), adminApi.getHealthChallenges()]);
      goalsCache  = g.goals.filter(x => x.isActive !== false);
      hcCache     = h.challenges.filter(x => x.isActive !== false);
    } catch(e) {}
  }

  const b      = id ? cache.find(x => x._id === id) : null;
  const isEdit = !!b;
  const root   = document.getElementById('modal-root');

  const imageSection = isEdit ? `
    <div class="form-section">🖼 Basket Image <span style="font-weight:400;color:var(--ink-faint)">(optional)</span></div>
    <div class="field full">
      <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:6px">
        <div id="img-thumb-wrap" style="flex-shrink:0">
          ${b.hasImage && b.imageUrl
            ? `<img id="img-preview" class="img-thumb-large" src="${escapeHtml(b.imageUrl)}" alt="Current"
                 onerror="this.style.display='none';document.getElementById('img-no-thumb').style.display='flex'" />`
            : ''}
          <div id="img-no-thumb" class="img-thumb-placeholder" style="display:${b.hasImage && b.imageUrl?'none':'flex'}">🧺</div>
        </div>
        <div style="flex:1;min-width:0">
          <div class="img-info-name" id="img-filename">${b.imageUrl ? 'Image saved' : 'No image yet'}</div>
          <div class="img-info-status ok" id="img-status">${b.imageUrl ? '✅ Saved to S3' : ''}</div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px">
            <input type="file" id="img-file-input" accept="image/jpeg,image/png,image/webp" />
            <button type="button" class="btn btn-primary btn-sm" id="img-upload-btn" disabled>⬆ Upload</button>
            ${b.imageUrl ? `<button type="button" class="btn btn-ghost btn-sm" style="color:var(--red)" id="img-delete-btn">Remove</button>` : ''}
          </div>
          <div style="font-size:11.5px;color:var(--ink-faint);margin-top:5px">💡 Choose a file → click Upload. Saves independently from fields below.</div>
        </div>
      </div>
    </div>
  ` : `
    <div class="form-section">🖼 Basket Image</div>
    <div class="field full">
      <div style="background:var(--surface);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--ink-faint);border:1px solid var(--border)">
        💡 <b>Save the basket first</b>, then re-open to upload an image.
      </div>
    </div>
  `;

  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)this.remove()">
      <div class="modal" style="max-width:660px">
        <div class="modal-head">
          <h3>${isEdit ? 'Edit Basket' : 'Add Curated Basket'}</h3>
          <button class="modal-close" onclick="document.getElementById('modal-root').innerHTML=''">✕</button>
        </div>
        <form id="bk-form" class="form-grid">

          <!-- ── Basic Info ─────────────────────────────── -->
          <div class="form-section">📋 Basic Info</div>

          <div class="field full">
            <label>Basket Name *</label>
            <input name="basketName" value="${escapeHtml(b?.basketName||'')}" placeholder="e.g. Iron Support Basket" required />
          </div>

          <div class="field full">
            <label>Description</label>
            <input name="description" value="${escapeHtml(b?.description||'')}" placeholder="Short description shown to customers" />
          </div>

          <!-- ── Target Profile ─────────────────────────── -->
          <div class="form-section">🎯 Target Profile</div>

          <div class="field">
            <label>Age Group *</label>
            <select name="ageGroup">
              <option value="">Select age group</option>
              ${AGE_GROUPS.map(a => `<option value="${escapeHtml(a)}" ${b?.ageGroup===a?'selected':''}>${escapeHtml(a)}</option>`).join('')}
            </select>
          </div>

          <div class="field">
            <label>Activity Level *</label>
            <select name="activityLevel">
              <option value="">Select activity level</option>
              ${ACTIVITY.map(a => `<option value="${escapeHtml(a)}" ${b?.activityLevel===a?'selected':''}>${escapeHtml(a)}</option>`).join('')}
            </select>
          </div>

          <div class="field full">
            <label>BMI Category *</label>
            <div class="toggle-chips" id="bmi-chips">
              ${BMI_CATS.map(c => `
                <span class="tog ${b?.bmiCategory===c.value?'on':''}" data-val="${c.value}">${escapeHtml(c.label)}</span>
              `).join('')}
            </div>
          </div>

          <!-- ── Wellness Goals ─────────────────────────── -->
          <div class="form-section">🌿 Wellness Goals</div>
          <div class="field full">
            <label>Select all that apply</label>
            <div class="toggle-chips" id="goals-chips"></div>
          </div>

          <!-- ── Health Challenges ──────────────────────── -->
          <div class="form-section">🩺 Health Challenges</div>
          <div class="field full">
            <label>Select conditions this basket supports</label>
            <div class="toggle-chips" id="hc-chips"></div>
          </div>

          <!-- ── Excluded Products ──────────────────────── -->
          <div class="form-section">⛔ Excluded Products</div>
          <div class="field full">
            <label>Products that must NEVER go into this basket</label>
            <div id="excluded-picker">
              <div class="picker-outer">
                <input class="picker-search" type="text" placeholder="Search products to exclude…" autocomplete="off" />
                <div class="picker-dropdown"></div>
              </div>
              <div class="chips-wrap"></div>
            </div>
            <div style="font-size:11.5px;color:var(--ink-faint);margin-top:4px">
              e.g. For diabetics: Potato, Beetroot, Banana
            </div>
          </div>

          <!-- ── Nutrition Targets ──────────────────────── -->
          <div class="form-section">🥗 Nutrition Targets</div>
          <div class="field full">
            <label>Target nutrition values for this basket profile</label>
            <div id="nut-rows"></div>
          </div>

          <!-- ── Image ──────────────────────────────────── -->
          ${imageSection}

          <!-- ── Status ─────────────────────────────────── -->
          ${isEdit ? `
          <div class="form-section">⚙️ Settings</div>
          <div class="field">
            <label>Status</label>
            <select name="isActive">
              <option value="true"  ${b.isActive!==false?'selected':''}>Active</option>
              <option value="false" ${b.isActive===false?'selected':''}>Inactive</option>
            </select>
          </div>` : ''}

        </form>
        <div class="modal-foot">
          <button class="btn btn-outline" onclick="document.getElementById('modal-root').innerHTML=''">Cancel</button>
          <button class="btn btn-primary" id="bk-save">${isEdit?'Save Changes':'Create Basket'}</button>
        </div>
      </div>
    </div>
  `;

  // BMI single-select chips
  let selectedBmi = b?.bmiCategory || '';
  document.querySelectorAll('#bmi-chips .tog').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#bmi-chips .tog').forEach(c => c.classList.remove('on'));
      chip.classList.add('on');
      selectedBmi = chip.dataset.val;
    });
  });

  // Goals + HC toggle chips
  initToggleChips('goals-chips', goalsCache.map(g=>g.goalName), b?.wellnessGoals||[]);
  initToggleChips('hc-chips',    hcCache.map(h=>h.name),        b?.healthChallenges||[], 'red');

  // Excluded products picker
  initExcludedPicker('excluded-picker', b?.excludedProducts||[]);

  // Nutrition rows
  initNutritionRows('nut-rows', b?.nutritionTargets||[]);

  // Image upload
  if (isEdit) initImageUpload(b);

  // Save
  document.getElementById('bk-save').addEventListener('click', async () => {
    const fd = new FormData(document.getElementById('bk-form'));
    const basketName = (fd.get('basketName')||'').trim();
    if (!basketName) { showToast('Basket name is required','error'); return; }
    if (!selectedBmi) { showToast('Please select a BMI category','error'); return; }
    if (!fd.get('ageGroup'))    { showToast('Please select an age group','error'); return; }
    if (!fd.get('activityLevel')) { showToast('Please select an activity level','error'); return; }

    const goalsPicker    = document.getElementById('goals-chips');
    const hcPicker       = document.getElementById('hc-chips');
    const excludedPicker = document.getElementById('excluded-picker');
    const nutWrap        = document.getElementById('nut-rows');

    const body = {
      basketName,
      description:      (fd.get('description')||'').trim(),
      ageGroup:         fd.get('ageGroup'),
      bmiCategory:      selectedBmi,
      activityLevel:    fd.get('activityLevel'),
      wellnessGoals:    goalsPicker?._getSelected ? goalsPicker._getSelected() : [],
      healthChallenges: hcPicker?._getSelected    ? hcPicker._getSelected()    : [],
      excludedProducts: excludedPicker?._getSelected ? excludedPicker._getSelected() : [],
      nutritionTargets: nutWrap?._getRows          ? nutWrap._getRows()         : [],
    };
    if (isEdit) body.isActive = fd.get('isActive') === 'true';

    const btn = document.getElementById('bk-save');
    btn.disabled=true; btn.textContent='Saving…';
    try {
      if (isEdit) await adminApi.updateBasket(b._id, body);
      else        await adminApi.createBasket(body);
      showToast('Basket saved','success');
      document.getElementById('modal-root').innerHTML='';
      load();
    } catch(e) {
      showToast(e.message,'error');
      btn.disabled=false; btn.textContent=isEdit?'Save Changes':'Create Basket';
    }
  });

  setTimeout(() => document.querySelector('#bk-form input[name="basketName"]')?.focus(), 50);
}

load();
</script>
</body>
</html>
