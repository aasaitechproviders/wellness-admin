<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Curated Baskets · KRISHA PURE Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/admin.css" />
<style>
  /* ── Product picker ─────────────────────────────────── */
  .picker-outer { position: relative; }
  .picker-search {
    width: 100%; padding: 9px 12px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: var(--font-body); font-size: 13.5px;
    color: var(--ink); background: var(--white); outline: none; box-sizing: border-box;
  }
  .picker-search:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(45,106,53,.1); }
  .picker-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.1);
    max-height: 220px; overflow-y: auto; z-index: 200; display: none;
  }
  .picker-dropdown.open { display: block; }
  .picker-option {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; cursor: pointer; font-size: 13.5px; transition: background .12s;
  }
  .picker-option:hover { background: var(--green-pale); }
  .picker-option.already { opacity: .45; cursor: default; pointer-events: none; }
  .picker-option .p-cat {
    font-size: 11px; background: var(--surface); color: var(--ink-faint);
    border-radius: 4px; padding: 1px 6px; margin-left: auto; white-space: nowrap;
  }
  .picker-empty { padding: 14px; text-align: center; color: var(--ink-faint); font-size: 13px; }

  /* ── Product chips ──────────────────────────────────── */
  .chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; min-height: 32px; padding: 8px 0 2px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--green-pale); color: var(--green);
    border: 1px solid rgba(45,106,53,.2); border-radius: 20px;
    padding: 4px 10px 4px 12px; font-size: 12.5px; font-weight: 500;
  }
  .chip-remove {
    cursor: pointer; font-size: 14px; line-height: 1; color: var(--green);
    opacity: .7; padding: 0 2px; border: none; background: none; font-family: inherit;
  }
  .chip-remove:hover { opacity: 1; }
  .chips-empty { color: var(--ink-faint); font-size: 12.5px; padding: 6px 0; }
  .picker-hint { font-size: 11.5px; color: var(--ink-faint); margin-top: 5px; }

  /* ── Nutrition panel ─────────────────────────────────── */
  .nutrition-panel {
    margin-top: 14px;
    border: 1.5px solid var(--border); border-radius: 12px;
    background: var(--white); overflow: hidden;
  }
  .nutrition-panel-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--green-pale);
    border-bottom: 1px solid var(--border);
  }
  .nutrition-panel-head .np-title {
    font-size: 12.5px; font-weight: 700; color: var(--green);
    display: flex; align-items: center; gap: 6px;
  }
  .nutrition-panel-head .np-sub {
    font-size: 11px; color: var(--ink-faint); font-weight: 400;
  }
  .nutrition-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }
  .nutrition-cell {
    padding: 10px 14px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .nutrition-cell:nth-child(4n) { border-right: none; }
  .nutrition-cell:nth-last-child(-n+4) { border-bottom: none; }
  .nc-label {
    font-size: 10.5px; color: var(--ink-faint); text-transform: uppercase;
    letter-spacing: .5px; font-weight: 600; margin-bottom: 3px;
  }
  .nc-value {
    font-family: var(--font-mono); font-size: 14px; font-weight: 600;
    color: var(--ink);
  }
  .nc-unit { font-size: 10px; color: var(--ink-faint); font-weight: 400; }
  .nutrition-empty {
    padding: 16px 14px; text-align: center;
    color: var(--ink-faint); font-size: 12.5px;
  }
  .nutrition-source-note {
    padding: 8px 14px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--ink-faint);
    background: var(--cream);
  }
  .nutrition-source-note b { color: var(--ink-soft); }

  /* ── Recipe builder ─────────────────────────────────── */
  .recipe-list { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
  .recipe-card {
    border: 1.5px solid var(--border); border-radius: 12px;
    background: var(--white); overflow: hidden;
  }
  .recipe-card-head {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .recipe-card-head input {
    flex: 1; border: none; background: transparent;
    font-family: var(--font-body); font-size: 13.5px; font-weight: 600;
    color: var(--ink); outline: none;
  }
  .recipe-card-head input::placeholder { font-weight: 400; color: var(--ink-faint); }
  .recipe-card-body { padding: 10px 12px; }
  .step-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 7px; }
  .step-bullet {
    width: 20px; height: 20px; min-width: 20px;
    background: var(--green-pale); color: var(--green);
    border-radius: 50%; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; margin-top: 8px;
  }
  .step-input {
    flex: 1; padding: 7px 10px;
    border: 1.5px solid var(--border); border-radius: 7px;
    font-family: var(--font-body); font-size: 13px; color: var(--ink);
    outline: none; resize: none; min-height: 36px;
  }
  .step-input:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(45,106,53,.08); }
  .step-remove {
    padding: 6px 4px; border: none; background: none;
    color: var(--ink-faint); cursor: pointer; font-size: 16px; line-height: 1; margin-top: 5px;
  }
  .step-remove:hover { color: var(--red); }
  .add-step-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 12.5px; color: var(--green); font-weight: 600;
    border: none; background: none; cursor: pointer; padding: 4px 0; margin-top: 4px;
  }
  .add-step-btn:hover { opacity: .75; }
  .add-recipe-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--green); font-weight: 600;
    border: 1.5px dashed rgba(45,106,53,.35); border-radius: 10px;
    background: var(--green-pale); cursor: pointer;
    padding: 10px 14px; width: 100%; margin-top: 4px; transition: background .12s;
  }
  .add-recipe-btn:hover { background: rgba(45,106,53,.12); }
  .remove-recipe-btn {
    padding: 3px 8px; border: none; background: none;
    color: var(--ink-faint); cursor: pointer; font-size: 13px; line-height: 1; border-radius: 5px;
  }
  .remove-recipe-btn:hover { background: var(--red-pale); color: var(--red); }

  /* ── Table recipe badge ─────────────────────────────── */
  .recipe-badge {
    font-size: 11px; background: #fff8e1; color: #b7860b;
    border-radius: 5px; padding: 2px 7px; display: inline-block; margin-top: 3px;
  }

  /* ── Wellness goal multi-picker ────────────────────── */
  .goal-multi-wrap { display:flex; flex-wrap:wrap; gap:7px; padding:6px 0 4px; }
  .goal-toggle {
    display:inline-flex; align-items:center; gap:5px;
    padding:5px 12px; border-radius:20px; cursor:pointer;
    font-size:12.5px; font-weight:500; user-select:none;
    border:1.5px solid var(--border); background:var(--white); color:var(--ink-faint);
    transition:all .12s;
  }
  .goal-toggle:hover { border-color:var(--green); color:var(--green); background:var(--green-pale); }
  .goal-toggle.selected { border-color:var(--green); background:var(--green); color:#fff; }
</style>
</head>
<body>
<script src="js/api.js"></script>
<script>Auth.guard();</script>
<script src="js/sidebar.js"></script>
<script>
const content = renderShell({
  active: 'baskets',
  title: 'Curated Baskets',
  sub: 'Pre-built wellness bundles — add products, set a flat price, and attach recipes',
  actions: `<button class="btn btn-primary btn-sm" id="add-btn">+ Add Basket</button>`,
});

let cache = [];
let goalsCache = [];

// Load goals immediately on page load so they're ready when modal opens
(async () => {
  try {
    const { goals } = await adminApi.getGoals();
    goalsCache = goals.filter(g => g.isActive !== false);
  } catch(e) {}
})();

content.innerHTML = `
  <div class="panel">
    <div class="table-wrap">
      <table class="data">
        <thead>
          <tr>
            <th>Basket</th>
            <th>Wellness Goals</th>
            <th>Products</th>
            <th>Nutrition (per basket)</th>
            <th>Recipes</th>
            <th>Price</th>
            <th>Featured</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="body">
          <tr><td colspan="9" class="loading-row"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div id="modal-root"></div>
`;

document.getElementById('add-btn').addEventListener('click', () => openModal(null));

// ── Nutrition helpers ────────────────────────────────────────────────────────
// Safely read nested nutrition value or fall back to flat Excel-style field
function nv(ing, nestedKey, flatKey) {
  const nested = ing.nutrition?.[nestedKey];
  if (nested != null && nested !== '') return Number(nested);
  const flat = ing[flatKey];
  if (flat != null && flat !== '') return Number(flat);
  return null;
}

const NUTRITION_FIELDS = [
  { key: 'calories',  flat: 'Calories_100g (Kcal)', label: 'Calories',  unit: 'kcal' },
  { key: 'carbs',     flat: 'Carbs_100g',            label: 'Carbs',     unit: 'g' },
  { key: 'protein',   flat: 'Protein_100g',          label: 'Protein',   unit: 'g' },
  { key: 'fat',       flat: 'Fat_100g',              label: 'Fat',       unit: 'g' },
  { key: 'fiber',     flat: 'Fiber_100g',            label: 'Fiber',     unit: 'g' },
  { key: 'sugar',     flat: 'Sugar_100g',            label: 'Sugar',     unit: 'g' },
  { key: 'iron',      flat: 'Iron_mg',               label: 'Iron',      unit: 'mg' },
  { key: 'calcium',   flat: 'Calcium_mg',            label: 'Calcium',   unit: 'mg' },
  { key: 'vitaminC',  flat: 'VitaminC_mg',           label: 'Vitamin C', unit: 'mg' },
  { key: 'potassium', flat: 'Potassium_mg',          label: 'Potassium', unit: 'mg' },
  { key: 'magnesium', flat: 'Magnesium_mg',          label: 'Magnesium', unit: 'mg' },
];

// Aggregate nutrition across all selected ingredient objects
function aggregateNutrition(ingredients) {
  if (!ingredients.length) return null;
  const totals = {};
  let hasAnyData = false;
  for (const f of NUTRITION_FIELDS) {
    let sum = 0; let count = 0;
    for (const ing of ingredients) {
      const v = nv(ing, f.key, f.flat);
      if (v != null) { sum += v; count++; }
    }
    if (count > 0) { totals[f.key] = Math.round(sum * 10) / 10; hasAnyData = true; }
    else totals[f.key] = null;
  }
  return hasAnyData ? totals : null;
}

// Render the live nutrition panel inside the modal
function renderNutritionPanel(ingredients) {
  const el = document.getElementById('nutrition-panel');
  if (!el) return;

  const totals = aggregateNutrition(ingredients);
  const names  = ingredients.map(i => i.name);

  if (!ingredients.length) {
    el.innerHTML = `
      <div class="nutrition-panel-head">
        <span class="np-title">🥗 Nutrition Summary <span class="np-sub">— auto-computed from products</span></span>
      </div>
      <div class="nutrition-empty">Add products above to see aggregated nutrition values</div>
    `;
    return;
  }

  if (!totals) {
    el.innerHTML = `
      <div class="nutrition-panel-head">
        <span class="np-title">🥗 Nutrition Summary <span class="np-sub">— auto-computed from products</span></span>
      </div>
      <div class="nutrition-empty">No nutrition data found for the selected products</div>
      <div class="nutrition-source-note">Sources: <b>${escapeHtml(names.join(', '))}</b></div>
    `;
    return;
  }

  const cells = NUTRITION_FIELDS
    .filter(f => totals[f.key] != null)
    .map(f => `
      <div class="nutrition-cell">
        <div class="nc-label">${f.label}</div>
        <div class="nc-value">${totals[f.key]}<span class="nc-unit"> ${f.unit}</span></div>
      </div>
    `).join('');

  el.innerHTML = `
    <div class="nutrition-panel-head">
      <span class="np-title">🥗 Nutrition Summary <span class="np-sub">— auto-computed from ${ingredients.length} product${ingredients.length > 1 ? 's' : ''}</span></span>
    </div>
    <div class="nutrition-grid">${cells}</div>
    <div class="nutrition-source-note">Sources: <b>${escapeHtml(names.join(', '))}</b></div>
  `;
}

// Format nutrition for table cell tooltip/summary
function fmtNutritionSummary(ns) {
  if (!ns) return '<span class="muted">—</span>';
  const parts = [];
  if (ns.calories != null) parts.push(`${ns.calories} kcal`);
  if (ns.protein  != null) parts.push(`P: ${ns.protein}g`);
  if (ns.carbs    != null) parts.push(`C: ${ns.carbs}g`);
  if (ns.fat      != null) parts.push(`F: ${ns.fat}g`);
  if (!parts.length) return '<span class="muted">—</span>';
  return `<span style="font-family:var(--font-mono);font-size:11.5px;color:var(--ink-soft)">${parts.join(' · ')}</span>`;
}

async function load() {
  document.getElementById('body').innerHTML = `<tr><td colspan="9" class="loading-row"><div class="spinner"></div></td></tr>`;
  try {
    const { baskets } = await adminApi.getBaskets();
    cache = baskets;
    document.getElementById('body').innerHTML = baskets.length ? baskets.map(b => {
      const recipeCount = (b.recipes || []).length;
      return `
        <tr>
          <td>
            <b>${escapeHtml(b.basketName)}</b>
            <div class="muted mono" style="font-size:11px">${escapeHtml(b.basketId || '')}</div>
          </td>
          <td>
            ${(Array.isArray(b.wellnessGoals) ? b.wellnessGoals : b.wellnessGoal ? [b.wellnessGoal] : [])
              .map(g => `<span style="font-size:11px;background:var(--green-pale);color:var(--green);border-radius:5px;padding:2px 7px;margin:1px;display:inline-block">${escapeHtml(g)}</span>`)
              .join('') || '–'}
          </td>
          <td style="max-width:180px" class="muted">
            ${(b.ingredientNames || []).length
              ? b.ingredientNames.slice(0, 3).join(', ') + (b.ingredientNames.length > 3 ? ` +${b.ingredientNames.length - 3} more` : '')
              : '<span style="color:var(--ink-faint)">No products</span>'}
          </td>
          <td>${fmtNutritionSummary(b.nutritionSummary)}</td>
          <td>
            ${recipeCount
              ? `<span class="recipe-badge">🍲 ${recipeCount} recipe${recipeCount > 1 ? 's' : ''}</span>`
              : '<span class="muted">—</span>'}
          </td>
          <td class="num">${fmtMoney(b.price)}</td>
          <td>${b.isFeatured ? '⭐' : '–'}</td>
          <td>
            <span class="pill ${b.isActive === false ? 'pill-cancelled' : 'pill-delivered'}">
              ${b.isActive === false ? 'Inactive' : 'Active'}
            </span>
          </td>
          <td>
            <button class="btn btn-ghost btn-sm" onclick="openModal('${b._id}')">Edit</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deactivate('${b._id}')">Deactivate</button>
          </td>
        </tr>
      `;
    }).join('') : `<tr><td colspan="9"><div class="empty"><div class="icon">🧺</div>No curated baskets yet</div></td></tr>`;
  } catch (e) {
    document.getElementById('body').innerHTML = `<tr><td colspan="9"><div class="empty"><div class="icon">⚠️</div>${escapeHtml(e.message)}</div></td></tr>`;
  }
}

async function hardDelete(id, name) {
  if (!confirm('Permanently delete "' + name + '"? This cannot be undone.')) return;
  try { await adminApi.hardDeleteBasket(id); showToast('Basket permanently deleted', 'success'); load(); }
  catch (e) { showToast(e.message, 'error'); }
}

async function deactivate(id) {
  if (!confirm('Deactivate this basket? It will stop appearing in recommendations.')) return;
  try { await adminApi.deleteBasket(id); showToast('Basket deactivated', 'success'); load(); }
  catch (e) { showToast(e.message, 'error'); }
}

// ── Product Picker (now tracks full ingredient objects) ─────────────────────
// ingredientObjects = array of full ingredient docs (with nutrition)
// ingredientNames   = array of name strings (for backward compat)
function initProductPicker(containerId, initialNames = []) {
  const root     = document.getElementById(containerId);
  const searchEl = root.querySelector('.picker-search');
  const dropdown = root.querySelector('.picker-dropdown');
  const chipsEl  = root.querySelector('.chips-wrap');
  const hintEl   = root.querySelector('.picker-hint');

  // selected: array of full ingredient objects
  // We start from names only (edit mode); objects get backfilled on first search
  let selected    = [];          // [{_id, name, category, nutrition, ...}]
  let nameOnlySet = new Set(initialNames); // names not yet resolved to objects
  let searchTimer = null;

  // If we're in edit mode, pre-load the ingredient objects for initial names
  // so nutrition can be computed immediately when modal opens
  if (initialNames.length) {
    adminApi.getIngredients({ limit: 200 }).then(({ ingredients }) => {
      const byName = {};
      ingredients.forEach(i => { byName[i.name] = i; });
      selected = initialNames.map(n => byName[n] || { name: n }).filter(Boolean);
      nameOnlySet = new Set();
      renderChips();
      renderNutritionPanel(selected.filter(i => i._id)); // only real objects
    }).catch(() => {
      // fallback: keep as name-only stubs
      selected = initialNames.map(n => ({ name: n }));
      renderChips();
    });
  }

  function updateHint() {
    if (hintEl) hintEl.textContent = `${selected.length} product(s) in basket`;
  }

  function renderChips() {
    if (!selected.length) {
      chipsEl.innerHTML = `<span class="chips-empty">No products selected — search above to add</span>`;
    } else {
      chipsEl.innerHTML = selected.map((ing, i) => `
        <span class="chip">
          ${escapeHtml(ing.name)}
          <button class="chip-remove" data-idx="${i}" title="Remove">✕</button>
        </span>
      `).join('');
      chipsEl.querySelectorAll('.chip-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          selected.splice(Number(btn.dataset.idx), 1);
          renderChips();
          updateHint();
          renderNutritionPanel(selected.filter(i => i._id));
        });
      });
    }
    updateHint();
  }

  function renderDropdown(items) {
    if (!items.length) {
      dropdown.innerHTML = `<div class="picker-empty">No products found</div>`;
    } else {
      dropdown.innerHTML = items.map(ing => {
        const already = selected.some(s => s.name === ing.name);
        return `<div class="picker-option ${already ? 'already' : ''}" data-name="${escapeHtml(ing.name)}">
          <span>${escapeHtml(ing.name)}</span>
          <span class="p-cat">${already ? 'Added' : escapeHtml(ing.category || '')}</span>
        </div>`;
      }).join('');
      // store full ingredient objects in a map for pick lookup
      const ingMap = {};
      items.forEach(i => { ingMap[i.name] = i; });
      dropdown.querySelectorAll('.picker-option:not(.already)').forEach(opt => {
        opt.addEventListener('mousedown', e => {
          e.preventDefault();
          const ing = ingMap[opt.dataset.name];
          if (ing) selected.push(ing);
          renderChips();
          searchEl.value = '';
          dropdown.classList.remove('open');
          renderNutritionPanel(selected.filter(i => i._id));
        });
      });
    }
    dropdown.classList.add('open');
  }

  async function doSearch(q) {
    try {
      const { ingredients } = await adminApi.getIngredients({ search: q, limit: 40 });
      renderDropdown(ingredients);
    } catch (e) {
      dropdown.innerHTML = `<div class="picker-empty">Search failed — ${escapeHtml(e.message)}</div>`;
      dropdown.classList.add('open');
    }
  }

  searchEl.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = searchEl.value.trim();
    if (!q) { dropdown.classList.remove('open'); return; }
    searchTimer = setTimeout(() => doSearch(q), 250);
  });
  searchEl.addEventListener('focus', () => { if (!searchEl.value.trim()) doSearch(''); });
  searchEl.addEventListener('blur',  () => setTimeout(() => dropdown.classList.remove('open'), 180));

  renderChips();

  // Expose getter — returns names (for backward compat) and full objects (for nutrition)
  root._getSelected      = () => selected.map(i => i.name);
  root._getSelectedObjs  = () => selected;
}

// ── Recipe Builder ───────────────────────────────────────────────────────────
function initRecipeBuilder(containerId, initialRecipes = []) {
  const root = document.getElementById(containerId);

  let recipes = initialRecipes.map(r => ({
    title: r.title || '',
    steps: Array.isArray(r.steps) && r.steps.length ? [...r.steps] : [''],
  }));
  if (!recipes.length) recipes = [{ title: '', steps: [''] }];

  function render() {
    root.innerHTML = '';
    const list = document.createElement('div');
    list.className = 'recipe-list';

    recipes.forEach((recipe, ri) => {
      const card = document.createElement('div');
      card.className = 'recipe-card';

      const head = document.createElement('div');
      head.className = 'recipe-card-head';

      const titleInput = document.createElement('input');
      titleInput.type        = 'text';
      titleInput.placeholder = `Recipe ${ri + 1} title — e.g. Spinach Dal Soup`;
      titleInput.value       = recipe.title;
      titleInput.addEventListener('input', () => { recipes[ri].title = titleInput.value; });

      const removeRecipeBtn = document.createElement('button');
      removeRecipeBtn.type      = 'button';
      removeRecipeBtn.className = 'remove-recipe-btn';
      removeRecipeBtn.title     = 'Remove this recipe';
      removeRecipeBtn.textContent = '✕ Remove';
      removeRecipeBtn.addEventListener('click', () => {
        recipes.splice(ri, 1);
        if (!recipes.length) recipes = [{ title: '', steps: [''] }];
        render();
      });

      head.appendChild(titleInput);
      head.appendChild(removeRecipeBtn);

      const body = document.createElement('div');
      body.className = 'recipe-card-body';

      function renderSteps() {
        body.innerHTML = '';
        recipe.steps.forEach((step, si) => {
          const row = document.createElement('div');
          row.className = 'step-row';

          const bullet = document.createElement('div');
          bullet.className   = 'step-bullet';
          bullet.textContent = si + 1;

          const textarea = document.createElement('textarea');
          textarea.className   = 'step-input';
          textarea.rows        = 1;
          textarea.placeholder = `Step ${si + 1} — e.g. Wash and chop spinach`;
          textarea.value       = step;
          textarea.addEventListener('input', () => {
            recipes[ri].steps[si] = textarea.value;
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
          });
          setTimeout(() => {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
          }, 0);
          textarea.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              recipes[ri].steps.splice(si + 1, 0, '');
              renderSteps();
              setTimeout(() => {
                const inputs = body.querySelectorAll('.step-input');
                if (inputs[si + 1]) inputs[si + 1].focus();
              }, 10);
            }
          });

          const removeBtn = document.createElement('button');
          removeBtn.type      = 'button';
          removeBtn.className = 'step-remove';
          removeBtn.title     = 'Remove step';
          removeBtn.textContent = '✕';
          removeBtn.addEventListener('click', () => {
            recipes[ri].steps.splice(si, 1);
            if (!recipes[ri].steps.length) recipes[ri].steps = [''];
            renderSteps();
          });

          row.appendChild(bullet);
          row.appendChild(textarea);
          row.appendChild(removeBtn);
          body.appendChild(row);
        });

        const addStepBtn = document.createElement('button');
        addStepBtn.type      = 'button';
        addStepBtn.className = 'add-step-btn';
        addStepBtn.innerHTML = '+ Add step';
        addStepBtn.addEventListener('click', () => {
          recipes[ri].steps.push('');
          renderSteps();
          setTimeout(() => {
            const inputs = body.querySelectorAll('.step-input');
            if (inputs.length) inputs[inputs.length - 1].focus();
          }, 10);
        });
        body.appendChild(addStepBtn);
      }

      renderSteps();
      card.appendChild(head);
      card.appendChild(body);
      list.appendChild(card);
    });

    root.appendChild(list);

    const addRecipeBtn = document.createElement('button');
    addRecipeBtn.type      = 'button';
    addRecipeBtn.className = 'add-recipe-btn';
    addRecipeBtn.innerHTML = '+ Add another recipe';
    addRecipeBtn.addEventListener('click', () => {
      recipes.push({ title: '', steps: [''] });
      render();
      setTimeout(() => {
        const cards = root.querySelectorAll('.recipe-card');
        if (cards.length) cards[cards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 50);
    });
    root.appendChild(addRecipeBtn);
  }

  render();
  root._getRecipes = () => recipes
    .map(r => ({
      title: r.title.trim(),
      steps: r.steps.map(s => s.trim()).filter(Boolean),
    }))
    .filter(r => r.steps.length > 0);
}

// ── Wellness Goal Multi-Picker ───────────────────────────────────────────────
function initGoalMultiPicker(containerId, currentGoals) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;

  let selected = Array.isArray(currentGoals) ? [...currentGoals]
    : (currentGoals ? [currentGoals] : []);

  if (!goalsCache.length) {
    wrap.innerHTML = `<span style="color:var(--ink-faint);font-size:12.5px">No goals found — add them in Wellness Goals first</span>`;
    wrap._getSelected = () => selected;
    return;
  }

  wrap.innerHTML = goalsCache.map(g => `
    <span class="goal-toggle ${selected.includes(g.goalName) ? 'selected' : ''}"
          data-goal="${escapeHtml(g.goalName)}">
      ${escapeHtml(g.goalName)}
    </span>
  `).join('');

  wrap.querySelectorAll('.goal-toggle').forEach(chip => {
    chip.addEventListener('click', () => {
      const goal = chip.dataset.goal;
      if (selected.includes(goal)) {
        selected = selected.filter(s => s !== goal);
        chip.classList.remove('selected');
      } else {
        selected.push(goal);
        chip.classList.add('selected');
      }
    });
  });

  wrap._getSelected = () => selected;
}

// ── Modal ────────────────────────────────────────────────────────────────────
async function openModal(id) {
  if (!goalsCache.length) {
    try {
      const { goals } = await adminApi.getGoals();
      goalsCache = goals.filter(g => g.isActive !== false);
    } catch(e) {}
  }

  const b      = id ? cache.find(x => x._id === id) : null;
  const isEdit = !!b;
  const root   = document.getElementById('modal-root');

  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) this.remove()">
      <div class="modal" style="max-width:620px">
        <div class="modal-head">
          <h3>${isEdit ? 'Edit Basket' : 'Add Basket'}</h3>
          <button class="modal-close" onclick="document.getElementById('modal-root').innerHTML=''">✕</button>
        </div>
        <form id="form" class="form-grid">

          <div class="field">
            <label>Basket Name *</label>
            <input name="basketName" value="${escapeHtml(b?.basketName || '')}" required />
          </div>

          <div class="field">
            <label>Basket ID</label>
            <input name="basketId" value="${escapeHtml(b?.basketId || '')}" placeholder="e.g. BSKT001" />
          </div>

          <div class="field full">
            <label>Wellness Goals <span style="font-weight:400;color:var(--ink-faint)">— select all that apply</span></label>
            <div class="goal-multi-wrap" id="goal-multi-picker"></div>
          </div>

          <div class="field">
            <label>Bundle Price (₹) *</label>
            <input name="price" type="number" min="0" value="${b?.price ?? ''}" required placeholder="Flat price for whole basket" />
          </div>

          <div class="field full">
            <label>Description</label>
            <input name="description" value="${escapeHtml(b?.description || '')}" />
          </div>

          <div class="field full">
            <label>Products in this basket</label>
            <div id="product-picker">
              <div class="picker-outer">
                <input class="picker-search" type="text" placeholder="Search products to add…" autocomplete="off" />
                <div class="picker-dropdown"></div>
              </div>
              <div class="chips-wrap"></div>
              <div class="picker-hint"></div>
            </div>
          </div>

          <div class="field full">
            <label>Target Nutrients <span style="font-weight:400;color:var(--ink-faint)">— auto-computed from chosen products</span></label>
            <!-- Live nutrition panel — updates as products are added/removed -->
            <div class="nutrition-panel" id="nutrition-panel">
              <div class="nutrition-panel-head">
                <span class="np-title">🥗 Nutrition Summary <span class="np-sub">— auto-computed from products</span></span>
              </div>
              <div class="nutrition-empty">Add products above to see aggregated nutrition values</div>
            </div>
          </div>

          <div class="field full">
            <label>
              Recipes
              <span style="font-weight:400;color:var(--ink-faint)">— each recipe has a title and bullet-point steps shown to the customer</span>
            </label>
            <div id="recipe-builder"></div>
          </div>

          <div class="field full">
            <label class="chip-toggle ${b?.isFeatured ? 'on' : ''}" id="featured-chip" style="display:inline-flex">
              <input type="checkbox" style="display:none" ${b?.isFeatured ? 'checked' : ''} /> ⭐ Featured Basket
            </label>
          </div>

        </form>
        <div class="modal-foot">
          <button class="btn btn-outline" onclick="document.getElementById('modal-root').innerHTML=''">Cancel</button>
          <button class="btn btn-primary" id="save">${isEdit ? 'Save Changes' : 'Create Basket'}</button>
        </div>
      </div>
    </div>
  `;

  initProductPicker('product-picker', b?.ingredientNames || []);

  const existingGoals = Array.isArray(b?.wellnessGoals) ? b.wellnessGoals
    : (b?.wellnessGoal ? [b.wellnessGoal] : []);
  initGoalMultiPicker('goal-multi-picker', existingGoals);
  initRecipeBuilder('recipe-builder', b?.recipes || []);

  // If editing and nutritionSummary exists, render it immediately (before lazy object load)
  if (b?.nutritionSummary) {
    const tempIngs = Object.keys(b.nutritionSummary).length
      ? [{ _id: 'stub', name: (b.ingredientNames || []).join(', '), nutrition: b.nutritionSummary }]
      : [];
    renderNutritionPanel(tempIngs.length ? [{ _id: 'stub', name: '', nutrition: b.nutritionSummary, ...b.nutritionSummary }] : []);
  }

  const chip = document.getElementById('featured-chip');
  chip.addEventListener('click', e => {
    e.preventDefault();
    chip.classList.toggle('on');
    chip.querySelector('input').checked = chip.classList.contains('on');
  });

  document.getElementById('save').addEventListener('click', async () => {
    const fd              = new FormData(document.getElementById('form'));
    const pickerEl        = document.getElementById('product-picker');
    const recipeBuilderEl = document.getElementById('recipe-builder');
    const selectedNames   = pickerEl._getSelected();
    const selectedObjs    = pickerEl._getSelectedObjs();
    const recipes         = recipeBuilderEl._getRecipes();

    // Compute nutritionSummary from the actual ingredient objects
    const realObjs       = selectedObjs.filter(i => i._id);
    const nutritionSummary = aggregateNutrition(realObjs);

    const body = {
      basketName:      fd.get('basketName'),
      basketId:        fd.get('basketId') || undefined,
      wellnessGoals:   (() => {
        const picker = document.getElementById('goal-multi-picker');
        return picker?._getSelected ? picker._getSelected() : [];
      })(),
      price:           fd.get('price') !== '' ? Number(fd.get('price')) : undefined,
      description:     fd.get('description') || undefined,
      ingredientNames: selectedNames,
      nutritionSummary: nutritionSummary || undefined,
      recipes,
      isFeatured:      chip.classList.contains('on'),
    };

    if (!body.basketName)        { showToast('Basket name is required', 'error'); return; }
    if (body.price === undefined) { showToast('Bundle price is required', 'error'); return; }

    const btn = document.getElementById('save');
    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      if (isEdit) await adminApi.updateBasket(b._id, body);
      else        await adminApi.createBasket(body);
      showToast('Basket saved', 'success');
      document.getElementById('modal-root').innerHTML = '';
      load();
    } catch (e) {
      showToast(e.message, 'error');
      btn.disabled = false; btn.textContent = isEdit ? 'Save Changes' : 'Create Basket';
    }
  });
}

load();
</script>
