<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Customers · KRISHA PURE Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<script src="js/api.js"></script>
<script>Auth.guard();</script>
<script src="js/sidebar.js"></script>
<script>
const content = renderShell({ active: 'customers', title: 'Customers', sub: 'Family accounts, members and wellness goals' });

let state = { search: '', city: '', page: 1, limit: 20 };
let goalsCache = null; // for the wellness-goal multi-select when editing members

content.innerHTML = `
  <div class="toolbar">
    <input type="text" id="f-search" placeholder="Search family name, phone or apartment…" />
    <select id="f-city"><option value="">All cities</option><option>Coimbatore</option><option>Chennai</option></select>
    <div class="spacer"></div>
    <button class="btn btn-ghost btn-sm" id="f-clear">Clear filters</button>
  </div>

  <div class="panel">
    <div class="table-wrap">
      <table class="data">
        <thead><tr>
          <th>Family</th><th>Phone</th><th>Apartment</th><th>City</th>
          <th>Members</th><th>Status</th><th></th>
        </tr></thead>
        <tbody id="customers-body"><tr><td colspan="7" class="loading-row"><div class="spinner"></div></td></tr></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div id="modal-root"></div>
`;

['f-search','f-city'].forEach(id => {
  const el = document.getElementById(id);
  let t;
  el.addEventListener(id === 'f-search' ? 'input' : 'change', () => {
    clearTimeout(t);
    t = setTimeout(() => {
      state.search = document.getElementById('f-search').value;
      state.city   = document.getElementById('f-city').value;
      state.page = 1;
      loadCustomers();
    }, id === 'f-search' ? 350 : 0);
  });
});
document.getElementById('f-clear').addEventListener('click', () => {
  state = { search: '', city: '', page: 1, limit: 20 };
  document.getElementById('f-search').value = '';
  document.getElementById('f-city').value = '';
  loadCustomers();
});

async function loadCustomers() {
  document.getElementById('customers-body').innerHTML = `<tr><td colspan="7" class="loading-row"><div class="spinner"></div></td></tr>`;
  try {
    const { customers, total, pages } = await adminApi.getCustomers(state);
    document.getElementById('customers-body').innerHTML = customers.length ? customers.map(c => `
      <tr>
        <td style="cursor:pointer" onclick="openCustomer('${c._id}')"><b>${escapeHtml(c.familyName || '–')}</b></td>
        <td class="mono">${escapeHtml(c.phone || '–')}</td>
        <td>${escapeHtml(c.apartmentName || '–')}${c.flatNo ? `, ${escapeHtml(c.flatNo)}` : ''}</td>
        <td>${escapeHtml(c.city || '–')}</td>
        <td>${(c.members || []).length}</td>
        <td><span class="pill ${c.isActive === false ? 'pill-cancelled' : 'pill-delivered'}">${c.isActive === false ? 'Inactive' : 'Active'}</span></td>
        <td><button class="btn btn-ghost btn-sm" onclick="openCustomer('${c._id}')">Manage</button></td>
      </tr>
    `).join('') : `<tr><td colspan="7"><div class="empty"><div class="icon">👪</div>No customers match these filters</div></td></tr>`;

    document.getElementById('pagination').innerHTML = `
      <span>${total} famil${total === 1 ? 'y' : 'ies'} · Page ${state.page} of ${pages || 1}</span>
      <button ${state.page <= 1 ? 'disabled' : ''} onclick="changePage(-1)">‹</button>
      <button ${state.page >= pages ? 'disabled' : ''} onclick="changePage(1)">›</button>
    `;
  } catch (e) {
    document.getElementById('customers-body').innerHTML = `<tr><td colspan="7"><div class="empty"><div class="icon">⚠️</div>${escapeHtml(e.message)}</div></td></tr>`;
  }
}
function changePage(d) { state.page += d; loadCustomers(); }

async function ensureGoals() {
  if (goalsCache) return goalsCache;
  try { const { goals } = await adminApi.getGoals(); goalsCache = goals; }
  catch { goalsCache = []; }
  return goalsCache;
}

function memberGoalsChips(member, goals) {
  const mine = new Set(member.wellnessGoals || []);
  return goals.map(g => `
    <label class="chip-toggle ${mine.has(g.goalId) ? 'on' : ''}">
      <input type="checkbox" value="${g.goalId}" ${mine.has(g.goalId) ? 'checked' : ''} style="display:none" />
      ${escapeHtml(g.goalName)}
    </label>
  `).join('');
}

async function openCustomer(id) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-backdrop" onclick="if(event.target===this) this.remove()"><div class="modal wide"><div class="loading-row"><div class="spinner"></div></div></div></div>`;
  try {
    const [{ customer: c, stats }, goals] = await Promise.all([adminApi.getCustomer(id), ensureGoals()]);
    renderCustomerModal(c, stats, goals);
  } catch (e) {
    root.querySelector('.modal').innerHTML = `<div class="empty"><div class="icon">⚠️</div>${escapeHtml(e.message)}</div>`;
  }
}

function renderCustomerModal(c, stats, goals) {
  const root = document.getElementById('modal-root');
  root.querySelector('.modal').innerHTML = `
    <div class="modal-head">
      <h3>${escapeHtml(c.familyName || 'Family')}</h3>
      <button class="modal-close" onclick="document.getElementById('modal-root').innerHTML=''">✕</button>
    </div>

    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:18px">
      <div class="stat-card" style="--accent:#2D6A35"><div class="label">Orders</div><div class="value">${stats.ordersCount}</div></div>
      <div class="stat-card" style="--accent:#C9A84C"><div class="label">Total Spent</div><div class="value" style="font-size:18px">${fmtMoney(stats.totalSpent)}</div></div>
      <div class="stat-card" style="--accent:#4A9456"><div class="label">Subscription</div><div class="value" style="font-size:14px">${stats.activeSubscription ? (stats.activeSubscription.planName || 'Active') : 'None'}</div></div>
    </div>

    <div class="panel-title" style="font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-faint)">Profile</div>
    <form id="profile-form" class="form-grid" style="margin-bottom:14px">
      <div class="field"><label>Family Name</label><input name="familyName" value="${escapeHtml(c.familyName || '')}" /></div>
      <div class="field"><label>Apartment</label><input name="apartmentName" value="${escapeHtml(c.apartmentName || '')}" /></div>
      <div class="field"><label>Flat No.</label><input name="flatNo" value="${escapeHtml(c.flatNo || '')}" /></div>
      <div class="field"><label>Tower / Block</label><input name="towerNo" value="${escapeHtml(c.towerNo || '')}" /></div>
      <div class="field"><label>City</label>
        <select name="city"><option ${c.city==='Coimbatore'?'selected':''}>Coimbatore</option><option ${c.city==='Chennai'?'selected':''}>Chennai</option></select>
      </div>
      <div class="field"><label>Diet Preference</label><input name="dietPreference" value="${escapeHtml(c.dietPreference || '')}" /></div>
      <div class="field full"><label>Address</label><input name="address" value="${escapeHtml(c.address || '')}" /></div>
      <div class="field">
        <label>Account Status</label>
        <select name="isActive">
          <option value="true" ${c.isActive !== false ? 'selected' : ''}>Active</option>
          <option value="false" ${c.isActive === false ? 'selected' : ''}>Inactive (disabled)</option>
        </select>
      </div>
    </form>
    <div style="display:flex;justify-content:flex-end;margin-bottom:18px">
      <button class="btn btn-primary btn-sm" id="save-profile">Save Profile</button>
    </div>

    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="panel-title" style="font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-faint)">Members (${(c.members||[]).length})</div>
      <button class="btn btn-outline btn-sm" id="add-member-btn">+ Add Member</button>
    </div>
    <div id="members-list">${renderMembers(c, goals)}</div>
  `;

  document.getElementById('save-profile').addEventListener('click', async () => {
    const fd = new FormData(document.getElementById('profile-form'));
    const body = Object.fromEntries(fd.entries());
    body.isActive = body.isActive === 'true';
    try {
      await adminApi.updateCustomer(c._id, body);
      showToast('Profile updated', 'success');
      loadCustomers();
    } catch (e) { showToast(e.message, 'error'); }
  });

  document.getElementById('add-member-btn').addEventListener('click', () => {
    openMemberForm(c._id, null, goals);
  });
}

function renderMembers(c, goals) {
  const members = c.members || [];
  if (!members.length) return `<div class="empty" style="padding:24px 0"><div class="icon">🧑‍🤝‍🧑</div>No members added yet</div>`;
  return members.map(m => `
    <div class="panel" style="padding:14px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <b>${escapeHtml(m.name)}</b>
          <span class="muted" style="font-size:12px"> ${m.age ? `· ${m.age} yrs` : ''} ${m.gender ? `· ${escapeHtml(m.gender)}` : ''}</span>
          <div style="margin-top:6px">
            ${(m.wellnessGoals || []).length ? (m.wellnessGoals || []).map(gid => {
              const g = goals.find(x => x.goalId === gid);
              return `<span class="pill" style="background:var(--green-pale);color:var(--green-dark);margin-right:5px">${escapeHtml(g ? g.goalName : gid)}</span>`;
            }).join('') : '<span class="muted" style="font-size:12px">No wellness goals set</span>'}
          </div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick='openMemberForm("${c._id}", ${JSON.stringify(m).replace(/'/g, "&apos;")}, window.__goals)'>Edit</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteMember('${c._id}','${m.memberId}')">Remove</button>
        </div>
      </div>
    </div>
  `).join('');
}

function openMemberForm(customerId, member, goals) {
  window.__goals = goals; // small escape hatch used by the inline onclick above
  const root = document.getElementById('modal-root2') || document.body.appendChild(Object.assign(document.createElement('div'), { id: 'modal-root2' }));
  const isEdit = !!member;
  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) this.remove()">
      <div class="modal">
        <div class="modal-head">
          <h3>${isEdit ? 'Edit Member' : 'Add Member'}</h3>
          <button class="modal-close" onclick="document.getElementById('modal-root2').innerHTML=''">✕</button>
        </div>
        <form id="member-form" class="form-grid">
          <div class="field"><label>Name</label><input name="name" value="${escapeHtml(member?.name || '')}" required /></div>
          <div class="field"><label>Age</label><input name="age" type="number" value="${member?.age || ''}" /></div>
          <div class="field full"><label>Gender</label>
            <select name="gender">
              <option value="">–</option>
              <option ${member?.gender==='Male'?'selected':''}>Male</option>
              <option ${member?.gender==='Female'?'selected':''}>Female</option>
              <option ${member?.gender==='Other'?'selected':''}>Other</option>
            </select>
          </div>
          <div class="field full">
            <label>Wellness Goals</label>
            <div class="chip-row">${memberGoalsChips(member || {}, goals)}</div>
          </div>
        </form>
        <div class="modal-foot">
          <button class="btn btn-outline" onclick="document.getElementById('modal-root2').innerHTML=''">Cancel</button>
          <button class="btn btn-primary" id="member-save">Save Member</button>
        </div>
      </div>
    </div>
  `;

  root.querySelectorAll('.chip-toggle').forEach(chip => {
    chip.addEventListener('click', (e) => {
      e.preventDefault();
      chip.classList.toggle('on');
      chip.querySelector('input').checked = chip.classList.contains('on');
    });
  });

  document.getElementById('member-save').addEventListener('click', async () => {
    const fd = new FormData(document.getElementById('member-form'));
    const body = { name: fd.get('name'), age: fd.get('age') ? Number(fd.get('age')) : null, gender: fd.get('gender') || null };
    body.wellnessGoals = Array.from(root.querySelectorAll('.chip-toggle.on input')).map(i => i.value);
    if (!body.name) { showToast('Name is required', 'error'); return; }
    try {
      if (isEdit) await adminApi.updateMember(customerId, member.memberId, body);
      else await adminApi.addMember(customerId, body);
      showToast('Member saved', 'success');
      root.innerHTML = '';
      openCustomer(customerId);
    } catch (e) { showToast(e.message, 'error'); }
  });
}

async function deleteMember(customerId, memberId) {
  if (!confirm('Remove this member from the family?')) return;
  try {
    await adminApi.deleteMember(customerId, memberId);
    showToast('Member removed', 'success');
    openCustomer(customerId);
  } catch (e) { showToast(e.message, 'error'); }
}

loadCustomers();
</script>
</body>
</html>
