<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Health Challenges · KRISHA PURE Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/admin.css" />
<style>
  .hc-thumb { width:44px;height:44px;border-radius:8px;object-fit:cover;border:1.5px solid var(--border);display:block; }
  .hc-thumb-empty { width:44px;height:44px;border-radius:8px;border:1.5px dashed var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink-faint); }
  .img-thumb-large { width:80px;height:80px;border-radius:8px;object-fit:cover;border:1.5px solid var(--border);flex-shrink:0;display:block; }
  .img-thumb-placeholder { width:80px;height:80px;border-radius:8px;border:1.5px dashed var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0; }
  .img-info-name { font-size:13px;font-weight:600;color:var(--ink); }
  .img-info-status { font-size:12px;margin-top:4px;font-weight:500; }
  .img-info-status.ok    { color:var(--green); }
  .img-info-status.error { color:var(--red); }
  .img-info-status.busy  { color:#7B5E2A; }
</style>
</head>
<body>
<script src="js/api.js"></script>
<script>Auth.guardMenu('health-challenges');</script>
<script src="js/sidebar.js"></script>
<script>
const content = renderShell({
  active: 'health-challenges',
  title: 'Health Challenges',
  sub: 'Challenges shown to customers during onboarding — helps personalise wellness baskets',
  actions: `<button class="btn btn-primary btn-sm" id="add-btn">+ Add Challenge</button>`,
});

let cache = [];

content.innerHTML = `
  <div class="panel">
    <div style="background:var(--green-pale);border:1px solid var(--green-muted);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--green)">
      💡 Active challenges appear in the customer onboarding flow. Customers can select the health challenges that apply to them — this helps personalise their wellness basket.
    </div>
    <div class="table-wrap">
      <table class="data">
        <thead><tr>
          <th style="width:56px">Image</th>
          <th>Challenge Name</th>
          <th>Status</th>
          <th></th>
        </tr></thead>
        <tbody id="body">
          <tr><td colspan="4" class="loading-row"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div id="modal-root"></div>
`;

document.getElementById('add-btn').addEventListener('click', () => openModal(null));

// ── Load ──────────────────────────────────────────────────────────────────────
async function load() {
  document.getElementById('body').innerHTML =
    `<tr><td colspan="4" class="loading-row"><div class="spinner"></div></td></tr>`;
  try {
    const { challenges } = await adminApi.getHealthChallenges();
    cache = challenges;
    document.getElementById('body').innerHTML = challenges.length
      ? challenges.map(c => `
        <tr>
          <td>
            ${c.hasImage && c.imageUrl
              ? `<img src="${escapeHtml(c.imageUrl)}" class="hc-thumb" alt="" loading="lazy" />`
              : `<div class="hc-thumb-empty">🩺</div>`
            }
          </td>
          <td><b>${escapeHtml(c.name)}</b></td>
          <td>
            <span class="pill ${c.isActive === false ? 'pill-cancelled' : 'pill-delivered'}">
              ${c.isActive === false ? 'Inactive' : 'Active'}
            </span>
          </td>
          <td style="white-space:nowrap">
            <button class="btn btn-ghost btn-sm" onclick="openModal('${c._id}')">Edit</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--red)"
              onclick="toggleActive('${c._id}', ${c.isActive === false})">
              ${c.isActive === false ? 'Activate' : 'Deactivate'}
            </button>
            <button class="btn btn-ghost btn-sm" style="color:#8B0000;font-weight:700"
              onclick="confirmDelete('${c._id}', '${escapeHtml(c.name)}')">Delete</button>
          </td>
        </tr>
      `).join('')
      : `<tr><td colspan="4"><div class="empty"><div class="icon">🩺</div>No health challenges yet. Add one above.</div></td></tr>`;
  } catch (e) {
    document.getElementById('body').innerHTML =
      `<tr><td colspan="4"><div class="empty"><div class="icon">⚠️</div>${escapeHtml(e.message)}</div></td></tr>`;
  }
}

// ── Toggle active ─────────────────────────────────────────────────────────────
async function toggleActive(id, isCurrentlyInactive) {
  const action = isCurrentlyInactive ? 'Activate' : 'Deactivate';
  if (!confirm(action + ' this health challenge?')) return;
  try {
    await adminApi.updateHealthChallenge(id, { isActive: !!isCurrentlyInactive });
    showToast('Challenge ' + action.toLowerCase() + 'd', 'success');
    load();
  } catch (e) { showToast(e.message, 'error'); }
}

// ── Hard delete ───────────────────────────────────────────────────────────────
async function confirmDelete(id, name) {
  if (!confirm(`Permanently delete "${name}"? This cannot be undone.`)) return;
  try {
    await adminApi.hardDeleteHealthChallenge(id);
    showToast('Challenge deleted', 'success');
    load();
  } catch (e) { showToast(e.message, 'error'); }
}

// ── Add / Edit Modal ──────────────────────────────────────────────────────────
function openModal(id) {
  const c      = id ? cache.find(x => x._id === id) : null;
  const isEdit = !!c;
  const root   = document.getElementById('modal-root');

  const imageSection = isEdit ? `
    <div class="field full">
      <label>Challenge Image</label>
      <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:10px">
        <div id="img-thumb-wrap" style="flex-shrink:0">
          ${c.hasImage && c.imageUrl
            ? `<img id="img-preview" class="img-thumb-large" src="${escapeHtml(c.imageUrl)}" alt="Current image"
                 onerror="this.style.display='none';document.getElementById('img-no-thumb').style.display='flex'" />`
            : ''
          }
          <div id="img-no-thumb" class="img-thumb-placeholder" style="display:${c.hasImage && c.imageUrl ? 'none' : 'flex'}">🩺</div>
        </div>
        <div style="flex:1;min-width:0">
          <div class="img-info-name" id="img-filename">${c.imageUrl ? 'Image saved' : 'No image yet'}</div>
          <div class="img-info-status ok" id="img-status">${c.imageUrl ? '✅ Saved to S3' : ''}</div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px">
            <input type="file" id="img-file-input" accept="image/jpeg,image/png,image/webp" />
            <button type="button" class="btn btn-primary btn-sm" id="img-upload-btn" disabled>⬆ Upload</button>
            ${c.imageUrl ? `<button type="button" class="btn btn-ghost btn-sm" style="color:var(--red)" id="img-delete-btn">Remove</button>` : ''}
          </div>
          <div style="font-size:11.5px;color:var(--ink-faint);margin-top:6px">💡 Choose a file → click <b>Upload</b>. Saves independently from the fields below.</div>
        </div>
      </div>
    </div>
  ` : `<div class="field full"><div style="background:var(--surface);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--ink-faint);border:1px solid var(--border)">💡 <b>Save the challenge first</b>, then re-open it to upload an image.</div></div>`;

  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) this.remove()">
      <div class="modal" style="max-width:460px">
        <div class="modal-head">
          <h3>${isEdit ? 'Edit Challenge' : 'Add Health Challenge'}</h3>
          <button class="modal-close" onclick="document.getElementById('modal-root').innerHTML=''">✕</button>
        </div>
        <form id="hc-form" class="form-grid">
          ${imageSection}
          <div class="field full">
            <label>Challenge Name *</label>
            <input name="name" value="${escapeHtml(c?.name || '')}"
              placeholder="e.g. High Blood Sugar" required
              style="font-size:15px" />
            <div style="font-size:12px;color:var(--ink-faint);margin-top:4px">
              This exact text is shown to customers during onboarding.
            </div>
          </div>
          ${isEdit ? `
          <div class="field full">
            <label>Status</label>
            <select name="isActive">
              <option value="true"  ${c.isActive !== false ? 'selected' : ''}>Active — shown to customers</option>
              <option value="false" ${c.isActive === false  ? 'selected' : ''}>Inactive — hidden from customers</option>
            </select>
          </div>` : ''}
        </form>
        <div class="modal-foot">
          <button class="btn btn-outline" onclick="document.getElementById('modal-root').innerHTML=''">Cancel</button>
          <button class="btn btn-primary" id="hc-save-btn">${isEdit ? 'Save Changes' : 'Add Challenge'}</button>
        </div>
      </div>
    </div>
  `;

  // ── Image handling (edit mode only) ──────────────────────────────────────
  if (isEdit) {
    var fileInput   = document.getElementById('img-file-input');
    var uploadBtn   = document.getElementById('img-upload-btn');
    var statusEl    = document.getElementById('img-status');
    var filenameEl  = document.getElementById('img-filename');
    var deleteBtn   = document.getElementById('img-delete-btn');
    var pendingFile = null;

    fileInput.addEventListener('change', function() {
      var file = fileInput.files[0];
      if (!file) return;
      if (!['image/jpeg','image/png','image/webp'].includes(file.type)) {
        showToast('Only JPEG, PNG, or WebP allowed', 'error');
        fileInput.value = '';
        return;
      }
      pendingFile = file;
      filenameEl.textContent = file.name;
      statusEl.className     = 'img-info-status';
      statusEl.textContent   = '📎 Ready to upload — click Upload';
      uploadBtn.disabled     = false;

      var reader = new FileReader();
      reader.onload = function(ev) {
        var preview = document.getElementById('img-preview');
        var noThumb = document.getElementById('img-no-thumb');
        if (preview) {
          preview.src = ev.target.result;
          preview.style.display = 'block';
        } else {
          if (noThumb) noThumb.style.display = 'none';
          var img = document.createElement('img');
          img.id = 'img-preview'; img.className = 'img-thumb-large';
          img.src = ev.target.result; img.alt = 'Preview';
          document.getElementById('img-thumb-wrap').prepend(img);
        }
      };
      reader.readAsDataURL(file);
    });

    uploadBtn.addEventListener('click', async function() {
      if (!pendingFile) return;
      uploadBtn.disabled = true; uploadBtn.textContent = '⏳ Uploading…';
      statusEl.className = 'img-info-status busy'; statusEl.textContent = 'Uploading to S3…';
      try {
        var res = await uploadHealthChallengeImageToS3(c._id, pendingFile);
        pendingFile = null;
        statusEl.className = 'img-info-status ok'; statusEl.textContent = '✅ Uploaded successfully';
        uploadBtn.textContent = '⬆ Upload'; uploadBtn.disabled = true;
        if (!document.getElementById('img-delete-btn')) {
          var btn = document.createElement('button');
          btn.type = 'button'; btn.id = 'img-delete-btn';
          btn.className = 'btn btn-ghost btn-sm'; btn.style.color = 'var(--red)';
          btn.textContent = 'Remove';
          btn.addEventListener('click', handleRemove);
          uploadBtn.insertAdjacentElement('afterend', btn);
        }
        showToast('Image uploaded ✅', 'success');
        load();
      } catch (e) {
        statusEl.className = 'img-info-status error'; statusEl.textContent = '❌ ' + e.message;
        uploadBtn.disabled = false; uploadBtn.textContent = '⬆ Retry';
        showToast(e.message, 'error');
      }
    });

    async function handleRemove() {
      if (!confirm('Remove image for this challenge?')) return;
      var btn = document.getElementById('img-delete-btn');
      btn.disabled = true; btn.textContent = 'Removing…';
      try {
        await adminApi.deleteHealthChallengeImage(c._id);
        var preview = document.getElementById('img-preview');
        var noThumb = document.getElementById('img-no-thumb');
        if (preview) preview.style.display = 'none';
        if (noThumb) noThumb.style.display = 'flex';
        filenameEl.textContent = 'No image yet';
        statusEl.className = 'img-info-status'; statusEl.textContent = '';
        uploadBtn.disabled = true; uploadBtn.textContent = '⬆ Upload';
        btn.remove(); fileInput.value = ''; pendingFile = null;
        showToast('Image removed', 'success'); load();
      } catch (e) {
        showToast(e.message, 'error');
        btn.disabled = false; btn.textContent = 'Remove';
      }
    }

    if (deleteBtn) deleteBtn.addEventListener('click', handleRemove);
  }

  // ── Save form ──────────────────────────────────────────────────────────────
  document.getElementById('hc-save-btn').addEventListener('click', async () => {
    const fd   = new FormData(document.getElementById('hc-form'));
    const name = (fd.get('name') || '').trim();
    if (!name) { showToast('Challenge name is required', 'error'); return; }

    const body = { name };
    if (isEdit) body.isActive = fd.get('isActive') === 'true';

    const btn = document.getElementById('hc-save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      if (isEdit) await adminApi.updateHealthChallenge(c._id, body);
      else        await adminApi.createHealthChallenge(body);
      showToast(isEdit ? 'Challenge updated' : 'Challenge added', 'success');
      document.getElementById('modal-root').innerHTML = '';
      load();
    } catch (e) {
      showToast(e.message, 'error');
      btn.disabled = false;
      btn.textContent = isEdit ? 'Save Changes' : 'Add Challenge';
    }
  });

  setTimeout(() => document.querySelector('#hc-form input[name="name"]')?.focus(), 50);
}

load();
</script>
</body>
</html>
