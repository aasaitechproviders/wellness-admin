<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In · KRISHA PURE Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/admin.css" />
<style>
  body { background: linear-gradient(160deg, #1E4D26 0%, #173A1D 100%); min-height: 100vh; }
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-card { width: 100%; max-width: 380px; background: var(--white); border-radius: 18px; padding: 32px 30px 28px; box-shadow: 0 24px 60px rgba(0,0,0,0.25); }
  .login-mark { width: 56px; height: 56px; border-radius: 16px; background: var(--green-pale); display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 16px; }
  .login-head { text-align: center; margin-bottom: 26px; }
  .login-head b { display: block; font-family: var(--font-head); font-size: 22px; font-weight: 700; color: var(--ink); }
  .login-head small { display: block; font-size: 11px; color: var(--ink-faint); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
  .login-error { background: var(--red-pale); color: var(--red); font-size: 12.5px; padding: 9px 12px; border-radius: 8px; margin-bottom: 14px; display: none; }
  .login-btn { width: 100%; padding: 12px; margin-top: 6px; }
  .login-foot { text-align: center; font-size: 11.5px; color: var(--ink-faint); margin-top: 20px; }
</style>
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="login-form">
      <div class="login-mark">🌿</div>
      <div class="login-head">
        <b>KRISHA PURE</b>
        <small>Admin Console</small>
      </div>

      <div class="login-error" id="login-error"></div>

      <div class="field">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>

      <button type="submit" class="btn btn-primary login-btn" id="login-btn">Sign In</button>
      <div class="login-foot">Operations access only · KRISHA PURE</div>
    </form>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (Auth.isLoggedIn()) {
      // Redirect to first allowed page
      const allowed = Auth.getAllowedMenus();
      if (allowed.length && allowed[0] !== 'dashboard') {
        window.location.href = allowed[0] + '.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    const form  = document.getElementById('login-form');
    const errEl = document.getElementById('login-error');
    const btn   = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.style.display = 'none';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const d = await adminApi.login(username, password);
        Auth.setSession(d.token, d.username, d.role, d.allowedMenus, d.displayName, d.isMaster);
        // Redirect to first allowed page
        const allowed = Auth.getAllowedMenus();
        if (allowed.includes('dashboard')) {
          window.location.href = 'dashboard.html';
        } else if (allowed.length) {
          window.location.href = allowed[0] + '.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      } catch (e) {
        errEl.textContent = e.message || 'Login failed';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
