<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Products · KRISHA PURE Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/admin.css" />
<style>
  /* ── Product grid ───────────────────────────────── */
  .product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:14px; }
  .product-card { background:var(--white); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:box-shadow .15s,transform .15s; }
  .product-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
  .product-thumb { height:110px; background:var(--cream-deep); display:flex; align-items:center; justify-content:center; font-size:38px; position:relative; overflow:hidden; }
  .product-thumb img { width:100%; height:100%; object-fit:cover; }
  .product-thumb .inactive-tag { position:absolute; top:6px; left:6px; background:rgba(0,0,0,.6); color:#fff; font-size:9.5px; padding:2px 7px; border-radius:50px; }
  .product-body { padding:10px 12px 12px; }
  .product-body .pname { font-weight:600; font-size:13.5px; margin-bottom:2px; }
  .product-body .pmeta { font-size:11px; color:var(--ink-faint); margin-bottom:8px; }
  .product-body .pactions { display:flex; gap:6px; }
  .wellness-mini { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:8px; min-height:18px; }
  .wellness-mini span { font-size:9.5px; padding:2px 6px; border-radius:50px; background:var(--green-pale); color:var(--green-dark); font-weight:600; }

  /* ── Wide modal ────────────────────────────────── */
  .modal.wide { max-width:820px; max-height:92vh; display:flex; flex-direction:column; }
  .modal.wide .modal-body { flex:1; overflow-y:auto; padding:20px 24px; }
  .modal.wide .modal-head,
  .modal.wide .modal-foot { flex-shrink:0; }

  /* ── Form sections ─────────────────────────────── */
  .form-section { border:1.5px solid var(--border); border-radius:12px; margin-bottom:18px; overflow:hidden; }
  .form-section-head { background:var(--surface); padding:9px 14px; font-size:11px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--ink-faint); border-bottom:1px solid var(--border); }
  .form-section-body { padding:14px 14px 6px; }
  .form-section-body .form-grid { margin:0; }

  /* ── Combo-select (select + add-new) ───────────── */
  .combo-wrap { display:flex; flex-direction:column; gap:5px; }
  .combo-new-row { display:flex; gap:6px; align-items:center; }
  .combo-new-input {
    flex:1; padding:8px 10px;
    border:1.5px solid var(--green); border-radius:8px;
    font-family:var(--font-body); font-size:13px; color:var(--ink); outline:none;
  }
  .combo-new-input:focus { box-shadow:0 0 0 3px rgba(45,106,53,.1); }
  .combo-cancel-btn {
    padding:6px 10px; border:none; background:var(--surface);
    border-radius:7px; cursor:pointer; font-size:12px; color:var(--ink-faint);
  }
  .combo-cancel-btn:hover { color:var(--red); }
  .combo-badge {
    font-size:11px; background:var(--green-pale); color:var(--green);
    border-radius:5px; padding:2px 8px; display:inline-flex; align-items:center; gap:5px;
  }
  .combo-badge button { border:none; background:none; cursor:pointer; color:var(--green); font-size:13px; padding:0; line-height:1; }

  /* ── Image ─────────────────────────────────────── */
  .img-drop { border:1.5px dashed var(--border); border-radius:10px; padding:18px 14px; text-align:center; cursor:pointer; background:var(--cream-deep); transition:border-color .15s; }
  .img-drop:hover { border-color:var(--green); }
  .img-preview { width:100px; height:100px; border-radius:10px; object-fit:cover; margin:0 auto 8px; display:block; }

  /* ── Cat count badges ──────────────────────────── */
  .cat-counts { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .cat-count { background:var(--white); border:1px solid var(--border); border-radius:10px; padding:8px 14px; font-size:12.5px; }
  .cat-count b { display:block; font-size:20px; font-weight:700; color:var(--green); }
</style>
</head>
<body>
<script src="js/api.js"></script>
<script>Auth.guard();</script>
<script src="js/sidebar.js"></script>
<script>
const content = renderShell({
  active: 'ingredients',
  title: 'Products',
  sub: 'Ingredient catalog — wellness scoring, suitability, nutrition and photos',
  actions: `<button class="btn btn-primary btn-sm" id="add-btn">+ Add Product</button>`,
});

let state = { search: '', category: '', page: 1, limit: 200 };
let cache = [];

// ── Option lists ─────────────────────────────────────────────────────────────
// These are the DEFAULTS. Admin can add new values from within the modal —
// new values are stored per-session in these arrays and remembered across
// opens within the same page load.
let CATEGORIES    = ['Vegetables', 'Leafy Vegetables', 'Fruits', 'Microgreens', 'Herbs & Spices', 'Others'];
let SERVING_UNITS = ['g', 'Kg', 'mg', 'ml', 'Liter'];
let SUITABILITY_4 = ['Not Suitable', 'Low', 'Medium', 'Excellent'];
let COOKING_OPTS  = ['Raw', 'Cooked', 'Both'];
let STORAGE_OPTS  = ['Ambient', 'Refrigerated'];
let FRIENDLY_4    = ['Low', 'Moderate', 'High', 'Excellent'];
let YES_NO        = ['Yes', 'No'];

const SCORE_FIELDS = [
  { key: 'diabetes',         label: 'Diabetes Score' },
  { key: 'weightLoss',       label: 'Weight Loss Score' },
  { key: 'immunity',         label: 'Immunity Score' },
  { key: 'detox',            label: 'Detox Score' },
  { key: 'satiety',          label: 'Satiety Score' },
  { key: 'antiInflammatory', label: 'Anti-Inflam. Score' },
];

const EMJ = { Vegetables:'🥦','Leafy Vegetables':'🥬',Fruits:'🍎',Microgreens:'🌱','Herbs & Spices':'🌿',default:'🥗' };

// ── Shell ─────────────────────────────────────────────────────────────────────
content.innerHTML = `
  <div id="cat-counts" class="cat-counts"></div>
  <div class="toolbar">
    <input type="text" id="f-search" placeholder="Search products…" />
    <select id="f-cat">
      <option value="">All categories</option>
      ${CATEGORIES.map(c => `<option>${c}</option>`).join('')}
    </select>
    <div class="spacer"></div>
  </div>
  <div class="product-grid" id="grid">
    <div class="loading-row" style="grid-column:1/-1"><div class="spinner"></div></div>
  </div>
  <div id="modal-root"></div>
`;

document.getElementById('add-btn').addEventListener('click', () => openModal(null));

['f-search','f-cat'].forEach(id => {
  let t;
  document.getElementById(id).addEventListener(id==='f-search'?'input':'change', () => {
    clearTimeout(t);
    t = setTimeout(() => {
      state.search   = document.getElementById('f-search').value;
      state.category = document.getElementById('f-cat').value;
      load();
    }, id==='f-search' ? 350 : 0);
  });
});

// ── Load ──────────────────────────────────────────────────────────────────────
async function load() {
  document.getElementById('grid').innerHTML = `<div class="loading-row" style="grid-column:1/-1"><div class="spinner"></div></div>`;
  try {
    const { ingredients } = await adminApi.getIngredients(state);
    cache = ingredients;

    // Merge any categories from DB that aren't in our default list
    ingredients.forEach(i => {
      if (i.category && !CATEGORIES.includes(i.category)) CATEGORIES.push(i.category);
    });

    if (!state.search && !state.category) {
      const counts = {};
      ingredients.forEach(i => { counts[i.category] = (counts[i.category]||0)+1; });
      document.getElementById('cat-counts').innerHTML =
        Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([cat,n]) =>
          `<div class="cat-count"><b>${n}</b>${escapeHtml(cat||'Uncategorised')}</div>`
        ).join('') + `<div class="cat-count"><b>${ingredients.length}</b>Total</div>`;
    }

    if (!ingredients.length) {
      document.getElementById('grid').innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">🥗</div>No products match these filters</div>`;
      return;
    }
    document.getElementById('grid').innerHTML = ingredients.map(ing => {
      const top = SCORE_FIELDS.filter(f=>(ing.wellnessScores?.[f.key]||0)>=70).slice(0,2);
      return `
        <div class="product-card">
          <div class="product-thumb">
            ${ing.isActive===false?'<span class="inactive-tag">Inactive</span>':''}
            ${ing.hasImage && ing.imageUrl?`<img src="${ing.imageUrl}" alt="${escapeHtml(ing.name)}" />`:(EMJ[ing.category]||EMJ.default)}
          </div>
          <div class="product-body">
            <div class="pname">${escapeHtml(ing.name)}</div>
            <div class="pmeta">${escapeHtml(ing.category||'–')}${ing.glycemic?.gi?` · GI ${ing.glycemic.gi}`:''}${ing.nutrition?.calories?` · ${ing.nutrition.calories} kcal`:''}</div>
            <div class="wellness-mini">${top.map(f=>`<span>${f.label}</span>`).join('')}</div>
            <div class="pactions">
              <button class="btn btn-outline btn-sm" style="flex:1" onclick="openModal('${ing._id}')">Edit</button>
              <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deactivate('${ing._id}')">${ing.isActive===false?'Deactivated':'Deactivate'}</button>
            </div>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">⚠️</div>${escapeHtml(e.message)}</div>`;
  }
}

async function deactivate(id) {
  if (!confirm('Deactivate this product? It will be hidden from the customer app.')) return;
  try { await adminApi.deleteIngredient(id); showToast('Product deactivated','success'); load(); }
  catch(e) { showToast(e.message,'error'); }
}

// ── Combo-select widget ───────────────────────────────────────────────────────
//
// Each combo renders:
//   <div class="combo-wrap" data-combo="fieldName" data-list="CATEGORIES">
//     <select>…options… <option value="__new__">＋ Add new…</option></select>
//     [hidden new-value row]
//   </div>
//
// getValue(fieldName) reads the final resolved value.
// After the modal innerHTML is set, call initCombos() to wire up all combos.

// Registry of current values — keyed by fieldName
const comboValues = {};

function comboHTML(fieldName, optList, currentVal, placeholder) {
  // If current value is set but not in the list, add it (e.g. loaded from DB)
  if (currentVal && !optList.includes(currentVal)) optList.push(currentVal);

  const placeholderOpt = placeholder ? `<option value="">${escapeHtml(placeholder)}</option>` : '';
  const opts = optList.map(o =>
    `<option value="${escapeHtml(o)}" ${o===currentVal?'selected':''}>${escapeHtml(o)}</option>`
  ).join('');

  return `
    <div class="combo-wrap" data-combo="${fieldName}" data-list-ref="${fieldName}">
      <select class="combo-select">
        ${placeholderOpt}
        ${opts}
        <option value="__new__">＋ Add new value…</option>
      </select>
      <!-- new-value row, hidden by default -->
      <div class="combo-new-row" style="display:none">
        <input class="combo-new-input" type="text" placeholder="Type new value and press Enter…" />
        <button type="button" class="combo-cancel-btn" title="Cancel">✕</button>
      </div>
      <!-- badge shows confirmed custom value -->
      <div class="combo-badge-wrap" style="display:none">
        <span class="combo-badge">
          <span class="combo-badge-text"></span>
          <button type="button" title="Clear">✕</button>
        </span>
      </div>
    </div>`;
}

// Map fieldName → which mutable array it should push new values into
const LIST_MAP = {
  category:            () => CATEGORIES,
  servingUnit:         () => SERVING_UNITS,
  juiceSuitability:    () => SUITABILITY_4,
  saladSuitability:    () => SUITABILITY_4,
  cookingSuitability:  () => COOKING_OPTS,
  storageType:         () => STORAGE_OPTS,
  kidFriendly:         () => FRIENDLY_4,
  seniorFriendly:      () => FRIENDLY_4,
  diabeticFriendly:    () => FRIENDLY_4,
  microgreenCompatible:() => YES_NO,
};

function initCombos(container) {
  container.querySelectorAll('[data-combo]').forEach(wrap => {
    const fieldName  = wrap.dataset.combo;
    const selectEl   = wrap.querySelector('.combo-select');
    const newRow     = wrap.querySelector('.combo-new-row');
    const newInput   = wrap.querySelector('.combo-new-input');
    const cancelBtn  = wrap.querySelector('.combo-cancel-btn');
    const badgeWrap  = wrap.querySelector('.combo-badge-wrap');
    const badgeText  = wrap.querySelector('.combo-badge-text');
    const badgeClear = wrap.querySelector('.combo-badge button');

    // Initialise stored value from current select
    comboValues[fieldName] = selectEl.value === '__new__' ? '' : selectEl.value;

    function showNewRow() {
      selectEl.style.display = 'none';
      newRow.style.display   = 'flex';
      newInput.value         = '';
      newInput.focus();
    }

    function confirmNew(val) {
      val = val.trim();
      if (!val) { cancelNew(); return; }

      // Add to the shared list so other combos of the same type see it too
      const arr = LIST_MAP[fieldName] ? LIST_MAP[fieldName]() : null;
      if (arr && !arr.includes(val)) arr.push(val);

      // Also add as <option> to this select so if admin cancels the badge they can re-pick it
      const existing = [...selectEl.options].find(o => o.value === val);
      if (!existing) {
        const opt = document.createElement('option');
        opt.value = val; opt.text = val;
        selectEl.insertBefore(opt, selectEl.querySelector('option[value="__new__"]'));
      }
      selectEl.value = val;

      // Show badge, hide new row
      newRow.style.display      = 'none';
      badgeText.textContent     = val;
      badgeWrap.style.display   = 'block';
      selectEl.style.display    = 'none'; // keep hidden while badge shown
      comboValues[fieldName]    = val;
    }

    function cancelNew() {
      newRow.style.display   = 'none';
      selectEl.style.display = 'block';
      // Revert select to whatever was chosen before
      if (comboValues[fieldName] && comboValues[fieldName] !== '__new__') {
        selectEl.value = comboValues[fieldName];
      } else {
        selectEl.value = '';
      }
    }

    function clearBadge() {
      badgeWrap.style.display = 'none';
      selectEl.style.display  = 'block';
      selectEl.value          = '';
      comboValues[fieldName]  = '';
    }

    selectEl.addEventListener('change', () => {
      if (selectEl.value === '__new__') { showNewRow(); return; }
      comboValues[fieldName] = selectEl.value;
    });

    newInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); confirmNew(newInput.value); }
      if (e.key === 'Escape') cancelNew();
    });

    cancelBtn.addEventListener('click', cancelNew);
    badgeClear.addEventListener('click', clearBadge);

    // If the current value is custom (set from a previous "Add new"), show badge immediately
    const currentVal = comboValues[fieldName];
    if (currentVal && currentVal !== '' && currentVal !== '__new__') {
      // Check if it was a pre-existing value — if so just leave select showing
      // (badge is only for newly typed values; pre-existing ones show in the <select>)
    }
  });
}

// Read the final value from a combo field
function getCombo(fieldName) {
  return comboValues[fieldName] || null;
}

// ── Field helpers ─────────────────────────────────────────────────────────────
function numField(name, val) {
  return `<input name="${name}" type="number" step="any" min="0" value="${val??''}" />`;
}
function textField(name, val, ph) {
  return `<input name="${name}" type="text" value="${escapeHtml(val||'')}" placeholder="${escapeHtml(ph||'')}" />`;
}
function fieldDiv(label, inner, full) {
  return `<div class="field${full?' full':''}">${label?`<label>${label}</label>`:''}${inner}</div>`;
}
function sectionWrap(icon, title, body) {
  return `<div class="form-section">
    <div class="form-section-head">${icon} ${escapeHtml(title)}</div>
    <div class="form-section-body"><div class="form-grid">${body}</div></div>
  </div>`;
}

// ── Image section ─────────────────────────────────────────────────────────────
// ing.imageUrl is the direct S3 public URL stored in MongoDB.
// ing.hasImage is the boolean flag.
function renderImageSection(ing) {
  if (ing.hasImage && ing.imageUrl) return `
    <img class="img-preview" src="${ing.imageUrl}?t=${Date.now()}" alt="${escapeHtml(ing.name)}"
         onerror="this.style.display='none'" />
    <div style="display:flex;gap:6px;justify-content:center;margin-top:8px">
      <label class="btn btn-outline btn-sm" style="cursor:pointer">Change Photo
        <input type="file" accept="image/jpeg,image/png,image/webp" style="display:none"
               onchange="handleImageUpload('${ing._id}',this)" />
      </label>
      <button class="btn btn-ghost btn-sm" style="color:var(--red)"
              onclick="removeImage('${ing._id}')">Remove</button>
    </div>`;
  return `
    <label class="img-drop" style="display:block;cursor:pointer">
      <div style="font-size:28px;margin-bottom:6px">📷</div>
      <div style="font-size:12.5px;font-weight:600;color:var(--ink)">Upload Photo</div>
      <div style="font-size:11px;color:var(--ink-faint);margin-top:3px">JPG, PNG or WebP</div>
      <input type="file" accept="image/jpeg,image/png,image/webp" style="display:none"
             onchange="handleImageUpload('${ing._id}',this)" />
    </label>`;
}

// ── Modal ──────────────────────────────────────────────────────────────────────
function openModal(id) {
  const ing    = id ? cache.find(x => x._id === id) : null;
  const isEdit = !!ing;

  const n  = ing?.nutrition      || {};
  const g  = ing?.glycemic       || {};
  const ws = ing?.wellnessScores || {};
  const su = ing?.suitability    || {};

  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) this.remove()">
      <div class="modal wide">
        <div class="modal-head">
          <h3>${isEdit ? `Edit: ${escapeHtml(ing.name)}` : 'Add Product'}</h3>
          <button class="modal-close" onclick="document.getElementById('modal-root').innerHTML=''">✕</button>
        </div>

        <div class="modal-body">
          <div style="display:grid;grid-template-columns:1fr 200px;gap:20px;align-items:start">

            <div>
              <form id="ing-form">

                <!-- 1. BASIC INFO -->
                ${sectionWrap('🌿','Basic Information',`
                  ${fieldDiv('Ingredient Name *', textField('name', ing?.name, 'e.g. Spinach'), true)}
                  ${fieldDiv('Category',    comboHTML('category',    [...CATEGORIES],    ing?.category,    '— select or add new —'))}
                  ${fieldDiv('Serving Unit', comboHTML('servingUnit', [...SERVING_UNITS], ing?.servingUnit, '— select or add new —'))}
                  ${fieldDiv('Best For (wellness tags)', textField('bestFor', ing?.bestFor, 'e.g. Iron, Immunity, Digestion'), true)}
                  ${fieldDiv('Seasonal',     textField('seasonal',     ing?.seasonal,     'e.g. Summer, Year-round'))}
                  ${fieldDiv('Shelf Life',   textField('shelfLife',    ing?.shelfLife,    'e.g. 3–5 days refrigerated'))}
                  ${fieldDiv('Taste Profile',textField('tasteProfile', ing?.tasteProfile, 'e.g. Earthy, Mild, Bitter'), true)}
                `)}

                <!-- 2. SUITABILITY -->
                ${sectionWrap('✅','Suitability',`
                  ${fieldDiv('Juice Suitability',     comboHTML('juiceSuitability',     [...SUITABILITY_4], su.juiceSuitability,     '— select or add new —'))}
                  ${fieldDiv('Salad Suitability',     comboHTML('saladSuitability',     [...SUITABILITY_4], su.saladSuitability,     '— select or add new —'))}
                  ${fieldDiv('Cooking Suitability',   comboHTML('cookingSuitability',   [...COOKING_OPTS],  su.cookingSuitability,   '— select or add new —'))}
                  ${fieldDiv('Storage Type',          comboHTML('storageType',          [...STORAGE_OPTS],  su.storageType,          '— select or add new —'))}
                  ${fieldDiv('Kid Friendly',          comboHTML('kidFriendly',          [...FRIENDLY_4],    su.kidFriendly,          '— select or add new —'))}
                  ${fieldDiv('Senior Friendly',       comboHTML('seniorFriendly',       [...FRIENDLY_4],    su.seniorFriendly,       '— select or add new —'))}
                  ${fieldDiv('Diabetic Friendly',     comboHTML('diabeticFriendly',     [...FRIENDLY_4],    su.diabeticFriendly,     '— select or add new —'))}
                  ${fieldDiv('Microgreen Compatible', comboHTML('microgreenCompatible', [...YES_NO],        su.microgreenCompatible, '— select or add new —'))}
                `)}

                <!-- 3. NUTRITION -->
                ${sectionWrap('🧬','Nutrition (per 100g)',`
                  ${fieldDiv('Calories (kcal)', numField('calories',  n.calories))}
                  ${fieldDiv('Carbs (g)',        numField('carbs',     n.carbs))}
                  ${fieldDiv('Fiber (g)',         numField('fiber',     n.fiber))}
                  ${fieldDiv('Protein (g)',       numField('protein',   n.protein))}
                  ${fieldDiv('Fat (g)',           numField('fat',       n.fat))}
                  ${fieldDiv('Sugar (g)',         numField('sugar',     n.sugar))}
                  ${fieldDiv('Iron (mg)',         numField('iron',      n.iron))}
                  ${fieldDiv('Calcium (mg)',      numField('calcium',   n.calcium))}
                  ${fieldDiv('Magnesium (mg)',    numField('magnesium', n.magnesium))}
                  ${fieldDiv('Potassium (mg)',    numField('potassium', n.potassium))}
                  ${fieldDiv('Vitamin C (mg)',    numField('vitaminC',  n.vitaminC))}
                `)}

                <!-- 4. GLYCEMIC -->
                ${sectionWrap('📊','Glycemic',`
                  ${fieldDiv('Glycemic Index (GI)', numField('gi', g.gi))}
                  ${fieldDiv('Glycemic Load (GL)',  numField('gl', g.gl))}
                `)}

                <!-- 5. WELLNESS SCORES -->
                ${sectionWrap('🎯','Wellness Scores (0 – 100)',`
                  ${SCORE_FIELDS.map(f =>
                    fieldDiv(f.label, `<input name="score_${f.key}" type="number" min="0" max="100" step="1" value="${ws[f.key]??''}" placeholder="0–100" />`)
                  ).join('')}
                `)}

              </form>
            </div>

            <!-- Photo column -->
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Product Photo</div>
              ${isEdit
                ? `<div id="image-section">${renderImageSection(ing)}</div>`
                : `<div class="img-drop" style="cursor:default">
                    <div style="font-size:24px;margin-bottom:6px">📷</div>
                    <div style="font-size:11px;color:var(--ink-faint)">Save the product first, then add a photo.</div>
                  </div>`}
            </div>
          </div>
        </div>

        <div class="modal-foot">
          <button class="btn btn-outline" onclick="document.getElementById('modal-root').innerHTML=''">Cancel</button>
          <button class="btn btn-primary" id="ing-save">${isEdit ? 'Save Changes' : 'Create Product'}</button>
        </div>
      </div>
    </div>`;

  // Wire up all combo widgets now that HTML is in the DOM
  initCombos(root);

  // ── Save ──────────────────────────────────────────────────────────────────
  document.getElementById('ing-save').addEventListener('click', async () => {
    const fd  = new FormData(document.getElementById('ing-form'));
    const num = k => { const v = fd.get(k); return v !== '' && v !== null ? Number(v) : null; };
    const str = k => fd.get(k) || null;

    const body = {
      name:         fd.get('name'),
      category:     getCombo('category'),
      servingUnit:  getCombo('servingUnit'),
      bestFor:      str('bestFor'),
      seasonal:     str('seasonal'),
      shelfLife:    str('shelfLife'),
      tasteProfile: str('tasteProfile'),

      suitability: {
        juiceSuitability:     getCombo('juiceSuitability'),
        saladSuitability:     getCombo('saladSuitability'),
        cookingSuitability:   getCombo('cookingSuitability'),
        storageType:          getCombo('storageType'),
        kidFriendly:          getCombo('kidFriendly'),
        seniorFriendly:       getCombo('seniorFriendly'),
        diabeticFriendly:     getCombo('diabeticFriendly'),
        microgreenCompatible: getCombo('microgreenCompatible'),
      },

      nutrition: {
        calories:  num('calories'),
        carbs:     num('carbs'),
        fiber:     num('fiber'),
        protein:   num('protein'),
        fat:       num('fat'),
        sugar:     num('sugar'),
        iron:      num('iron'),
        calcium:   num('calcium'),
        magnesium: num('magnesium'),
        potassium: num('potassium'),
        vitaminC:  num('vitaminC'),
      },

      glycemic: { gi: num('gi'), gl: num('gl') },

      wellnessScores: Object.fromEntries(
        SCORE_FIELDS.map(f => [f.key, num(`score_${f.key}`) ?? 0])
      ),
    };

    if (!body.name) { showToast('Ingredient name is required', 'error'); return; }

    const btn = document.getElementById('ing-save');
    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      if (isEdit) {
        await adminApi.updateIngredient(ing._id, body);
        showToast('Product updated', 'success');
        await load();
        document.getElementById('modal-root').innerHTML = '';
      } else {
        const { ingredient } = await adminApi.createIngredient(body);
        showToast('Product created — add a photo below', 'success');
        await load();
        openModal(ingredient._id);
        return;
      }
    } catch(e) { showToast(e.message, 'error'); }

    btn.disabled = false;
    btn.textContent = isEdit ? 'Save Changes' : 'Create Product';
  });
}

// ── Image handlers (S3 presign flow) ─────────────────────────────────────────
// uploadIngredientImageToS3 lives in api.js — it handles compress → presign → S3 PUT → confirm
async function handleImageUpload(id, inputEl) {
  const file = inputEl.files[0];
  if (!file) return;

  const section = document.getElementById('image-section');
  section.innerHTML = `
    <div style="text-align:center;padding:20px 0">
      <div class="spinner" style="margin:0 auto 8px"></div>
      <div style="font-size:12px;color:var(--ink-faint)">Uploading to S3…</div>
    </div>`;

  try {
    const { imageUrl } = await uploadIngredientImageToS3(id, file);
    showToast('Photo saved', 'success');

    // Update cache entry so the grid and modal both show the new image
    await load();
    const updated = cache.find(x => x._id === id) || { _id: id, hasImage: true, imageUrl, name: '' };
    updated.hasImage = true;
    updated.imageUrl = imageUrl;
    section.innerHTML = renderImageSection(updated);
  } catch(e) {
    showToast(e.message, 'error');
    // Restore whatever was there before
    const prev = cache.find(x => x._id === id) || { _id: id, hasImage: false, name: '' };
    section.innerHTML = renderImageSection(prev);
  }
}

async function removeImage(id) {
  if (!confirm('Remove this photo?')) return;
  try {
    await adminApi.deleteIngredientImage(id);
    showToast('Photo removed', 'success');
    // Clear from cache too
    const cached = cache.find(x => x._id === id);
    if (cached) { cached.hasImage = false; cached.imageUrl = null; }
    document.getElementById('image-section').innerHTML = renderImageSection({ _id: id, hasImage: false, name: '' });
    load();
  } catch(e) { showToast(e.message, 'error'); }
}

load();
</script>
