<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Subscription Packages · KRISHA PURE Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<script src="js/api.js"></script>
<script>Auth.guard();</script>
<script src="js/sidebar.js"></script>
<script>
const content = renderShell({
  active: 'subscription-plans',
  title: 'Subscription Packages',
  sub: 'Delivery frequency plans with a % discount applied on the basket price at checkout',
  actions: `<button class="btn btn-primary btn-sm" id="add-btn">+ Add Package</button>`,
});

let planCache = [];

content.innerHTML = `
  <div class="panel">
    <div class="table-wrap">
      <table class="data">
        <thead>
          <tr>
            <th>Package</th>
            <th>Frequency</th>
            <th>Deliveries / Cycle</th>
            <th>Discount</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="body">
          <tr><td colspan="6" class="loading-row"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div id="modal-root"></div>
`;

document.getElementById('add-btn').addEventListener('click', () => openModal(null));

function freqLabel(p) {
  const dpc = p.deliveriesPerCycle || 1;
  const dur = p.duration || 7;
  if (dpc === 1  && dur === 7)  return 'Once a week';
  if (dpc === 2  && dur === 7)  return 'Twice a week';
  if (dpc === 3  && dur === 7)  return '3× a week';
  if (dpc === 7  && dur === 7)  return 'Daily';
  if (dpc === 1  && dur === 15) return 'Bi-weekly';
  if (dpc === 1  && dur === 30) return 'Monthly';
  return `${dpc}× per ${dur} days`;
}

async function load() {
  document.getElementById('body').innerHTML = `<tr><td colspan="6" class="loading-row"><div class="spinner"></div></td></tr>`;
  try {
    const { plans } = await adminApi.getPlans();
    planCache = plans;
    document.getElementById('body').innerHTML = plans.length ? plans.map(p => {
      const dtype = p.discountType  || 'percent';
      const dval  = p.discountValue || 0;
      const discountLabel = dval
        ? (dtype === 'percent' ? `${dval}% off` : `₹${dval} off`)
        : 'No discount';

      return `
        <tr>
          <td>
            <b>${escapeHtml(p.planName)}</b>
            <div class="mono muted" style="font-size:11px">${escapeHtml(p.planId || '')}</div>
            ${p.description ? `<div class="muted" style="font-size:11px">${escapeHtml(p.description)}</div>` : ''}
          </td>
          <td>${p.duration || 7} days</td>
          <td>${p.deliveriesPerCycle || 1}× — ${freqLabel(p)}</td>
          <td>
            <span style="color:${dval ? '#c0392b' : 'var(--ink-faint)'}; font-weight:${dval ? 600 : 400}">
              ${escapeHtml(discountLabel)}
            </span>
          </td>
          <td>
            <span class="pill ${p.isActive === false ? 'pill-cancelled' : 'pill-delivered'}">
              ${p.isActive === false ? 'Inactive' : 'Active'}
            </span>
          </td>
          <td style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-ghost btn-sm" onclick="viewPlan('${p._id}')">View</button>
            <button class="btn btn-ghost btn-sm" onclick="openModal('${p._id}')">Edit</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deactivate('${p._id}')">Deactivate</button>
            <button class="btn btn-ghost btn-sm" style="color:#8B0000;font-weight:700" onclick="hardDelete('${p._id}', '${escapeHtml(p.planName)}')">Delete</button>
          </td>
        </tr>
      `;
    }).join('') : `<tr><td colspan="6"><div class="empty"><div class="icon">📦</div>No subscription packages yet</div></td></tr>`;
  } catch (e) {
    document.getElementById('body').innerHTML = `<tr><td colspan="6"><div class="empty"><div class="icon">⚠️</div>${escapeHtml(e.message)}</div></td></tr>`;
  }
}

async function hardDelete(id, name) {
  if (!confirm('Permanently delete "' + name + '"? This cannot be undone.')) return;
  try { await adminApi.hardDeletePlan(id); showToast('Package permanently deleted', 'success'); load(); }
  catch (e) { showToast(e.message, 'error'); }
}

async function deactivate(id) {
  if (!confirm('Deactivate this package?')) return;
  try { await adminApi.deletePlan(id); showToast('Package deactivated', 'success'); load(); }
  catch (e) { showToast(e.message, 'error'); }
}

function openModal(id) {
  const p      = id ? planCache.find(x => x._id === id) : null;
  const isEdit = !!p;
  const root   = document.getElementById('modal-root');

  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) this.remove()">
      <div class="modal">
        <div class="modal-head">
          <h3>${isEdit ? 'Edit Package' : 'Add Package'}</h3>
          <button class="modal-close" onclick="document.getElementById('modal-root').innerHTML=''">✕</button>
        </div>
        <form id="form" class="form-grid">

          <div class="field full">
            <label>Package Name *</label>
            <input name="planName" value="${escapeHtml(p?.planName || '')}" placeholder="e.g. Weekly Plan" required />
          </div>

          <div class="field">
            <label>Plan ID *</label>
            <input name="planId" value="${escapeHtml(p?.planId || '')}"
              placeholder="e.g. PLAN001"
              ${isEdit ? 'readonly style="background:var(--surface);color:var(--ink-faint)"' : 'required'} />
          </div>

          <div class="field">
            <label>Cycle Length *</label>
            <select name="duration">
              <option value="7"  ${(p?.duration ?? 7)  === 7  ? 'selected' : ''}>7 days (Weekly)</option>
              <option value="15" ${p?.duration === 15 ? 'selected' : ''}>15 days (Bi-Weekly)</option>
              <option value="30" ${p?.duration === 30 ? 'selected' : ''}>30 days (Monthly)</option>
            </select>
          </div>

          <div class="field full">
            <label>Deliveries per cycle *</label>
            <select name="deliveriesPerCycle">
              <option value="1"  ${(p?.deliveriesPerCycle ?? 1) === 1  ? 'selected' : ''}>1 — Once per cycle</option>
              <option value="2"  ${p?.deliveriesPerCycle === 2  ? 'selected' : ''}>2 — Twice per cycle</option>
              <option value="3"  ${p?.deliveriesPerCycle === 3  ? 'selected' : ''}>3 — Three times per cycle</option>
              <option value="4"  ${p?.deliveriesPerCycle === 4  ? 'selected' : ''}>4 — Four times per cycle</option>
              <option value="7"  ${p?.deliveriesPerCycle === 7  ? 'selected' : ''}>7 — Daily</option>
            </select>
          </div>

          <div class="field">
            <label>Discount Type</label>
            <select name="discountType" id="sel-dtype">
              <option value="percent" ${(p?.discountType ?? 'percent') === 'percent' ? 'selected' : ''}>Percentage (%)</option>
              <option value="flat"    ${p?.discountType === 'flat' ? 'selected' : ''}>Flat Amount (₹)</option>
            </select>
          </div>

          <div class="field">
            <label>Discount Value <span id="discount-hint" style="font-weight:400;color:var(--ink-faint)">(% off basket price)</span></label>
            <input name="discountValue" id="inp-dval" type="number" min="0"
              value="${p?.discountValue ?? 0}" placeholder="0 = no discount" />
          </div>

          <div class="field full">
            <label>Description <span style="font-weight:400;color:var(--ink-faint)">(optional — shown to customers)</span></label>
            <input name="description" value="${escapeHtml(p?.description || '')}" placeholder="e.g. Best value for weekly wellness" />
          </div>

        </form>
        <div class="modal-foot">
          <button class="btn btn-outline" onclick="document.getElementById('modal-root').innerHTML=''">Cancel</button>
          <button class="btn btn-primary" id="save">${isEdit ? 'Save Changes' : 'Create Package'}</button>
        </div>
      </div>
    </div>
  `;

  // Update discount hint when type changes
  const selDtype = document.getElementById('sel-dtype');
  const inpDval  = document.getElementById('inp-dval');
  const hint     = document.getElementById('discount-hint');

  selDtype.addEventListener('change', () => {
    if (selDtype.value === 'percent') {
      hint.textContent = '(% off basket price)';
      inpDval.max = 100;
    } else {
      hint.textContent = '(₹ off basket price)';
      inpDval.removeAttribute('max');
    }
  });

  document.getElementById('save').addEventListener('click', async () => {
    const fd   = new FormData(document.getElementById('form'));
    const body = {
      planName:           fd.get('planName'),
      planId:             fd.get('planId'),
      duration:           Number(fd.get('duration')),
      deliveriesPerCycle: Number(fd.get('deliveriesPerCycle')) || 1,
      discountType:       fd.get('discountType'),
      discountValue:      Number(fd.get('discountValue')) || 0,
      description:        fd.get('description') || undefined,
    };

    if (!body.planName)          { showToast('Package name is required', 'error'); return; }
    if (!isEdit && !body.planId) { showToast('Plan ID is required', 'error'); return; }
    if (body.discountType === 'percent' && body.discountValue > 100) {
      showToast('Percentage discount cannot exceed 100', 'error'); return;
    }

    const btn = document.getElementById('save');
    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      if (isEdit) await adminApi.updatePlan(p._id, body);
      else        await adminApi.createPlan(body);
      showToast('Package saved', 'success');
      document.getElementById('modal-root').innerHTML = '';
      load();
    } catch (e) {
      showToast(e.message, 'error');
      btn.disabled = false;
      btn.textContent = isEdit ? 'Save Changes' : 'Create Package';
    }
  });
}

function viewPlan(id) {
  const p = cache.find(x => x._id === id);
  if (!p) return;
  const root = document.getElementById('modal-root');
  const dtype = p.discountType === 'percent' ? '%' : '₹ flat';
  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)this.remove()">
      <div class="modal" style="max-width:420px">
        <div class="modal-head">
          <h3>📅 ${escapeHtml(p.planName)}</h3>
          <button class="modal-close" onclick="document.getElementById('modal-root').innerHTML=''">✕</button>
        </div>
        <div class="form-grid" style="gap:0 14px;padding:4px 0 8px">
          <div class="field"><label>Plan ID</label><div style="font-family:var(--font-mono);font-size:13px">${escapeHtml(p.planId||'—')}</div></div>
          <div class="field"><label>Duration</label><div>${p.duration||7} days</div></div>
          <div class="field"><label>Deliveries / Cycle</label><div>${p.deliveriesPerCycle||1}</div></div>
          <div class="field"><label>Discount</label><div>${p.discountValue||0} ${dtype}</div></div>
          ${p.description ? `<div class="field full"><label>Description</label><div style="font-size:13px">${escapeHtml(p.description)}</div></div>` : ''}
          <div class="field full"><label>Status</label>
            <span class="pill ${p.isActive===false?'pill-cancelled':'pill-delivered'}">${p.isActive===false?'Inactive':'Active'}</span>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-outline" onclick="document.getElementById('modal-root').innerHTML=''">Close</button>
          <button class="btn btn-primary" onclick="document.getElementById('modal-root').innerHTML='';openModal('${p._id}')">Edit</button>
        </div>
      </div>
    </div>`;
}

load();
</script>
</body>
</html>
